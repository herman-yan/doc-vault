<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>返修业务管理系统 - 宁家服务数字化运营系统</title>
<style>
:root {
  --primary: #2563eb;
  --primary-light: #3b82f6;
  --primary-deep: #1d4ed8;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-secondary: #64748b;
  --sidebar-w: 220px;
  --accent-grad: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  --blue-grad: linear-gradient(135deg,#2563eb 0%,#06b6d4 100%);
  --green-grad: linear-gradient(135deg,#10b981 0%,#059669 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Sidebar */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); color: #fff; z-index: 100; display: flex; flex-direction: column; box-shadow: 4px 0 24px rgba(0,0,0,.12); }
.sidebar-brand { padding: 24px 18px; font-size: 17px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03); letter-spacing: .5px; }
.sidebar-brand small { display: block; font-size: 11px; font-weight: 400; color: #94a3b8; margin-top: 5px; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section { padding: 14px 18px 6px; font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
.nav-item { display: flex; align-items: center; padding: 11px 18px; cursor: pointer; color: #94a3b8; font-size: 13.5px; transition: all .18s ease; border-left: 3px solid transparent; gap: 10px; }
.nav-item:hover { background: rgba(99,102,241,.1); color: #e2e8f0; }
.nav-item.active { background: rgba(99,102,241,.15); color: #818cf8; border-left-color: #818cf8; font-weight: 500; }
.nav-item .icon { width: 22px; text-align: center; font-size: 16px; }
.nav-badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 600; }

/* Main */
.main { margin-left: var(--sidebar-w); padding: 28px 32px; min-height: 100vh; background: var(--bg); }

/* Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
.page-title { font-size: 26px; font-weight: 800; background: var(--blue-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -.5px; }
.page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Cards */
.card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 22px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.03); transition: box-shadow .2s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; letter-spacing: .2px; }
.badge-blue { background: #dbeafe; color: var(--primary); }
.badge-green { background: #dcfce7; color: var(--success); }
.badge-yellow { background: #fef3c7; color: var(--warning); }
.badge-red { background: #fee2e2; color: var(--danger); }
.badge-gray { background: #f1f5f9; color: var(--text-secondary); }
.badge-purple { background: #ede9fe; color: #7c3aed; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.03); transition: transform .2s, box-shadow .2s; }
.stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(37,99,235,.1); }
.stat-number { font-size: 32px; font-weight: 800; background: var(--blue-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: 12.5px; color: var(--text-secondary); margin-top: 6px; font-weight: 500; }

/* Pipeline / Status Filter */
.pipeline { display: flex; align-items: center; gap: 0; margin-bottom: 26px; overflow-x: auto; padding-bottom: 8px; }
.pipeline-step { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: all .2s ease; font-weight: 500; box-shadow: 0 1px 3px rgba(0,0,0,.03); }
.pipeline-step:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(37,99,235,.12); }
.pipeline-step.active { background: var(--blue-grad); color: #fff; border-color: transparent; box-shadow: 0 3px 12px rgba(37,99,235,.3); }
.pipeline-arrow { color: #cbd5e1; font-size: 18px; margin: 0 4px; flex-shrink: 0; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card); box-shadow: 0 1px 3px rgba(0,0,0,.03); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: linear-gradient(180deg,#f8fafc,#f1f5f9); padding: 8px 10px; text-align: left; font-weight: 700; color: var(--text-secondary); border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; letter-spacing: .2px; font-size: 12.5px; }
tbody td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; font-size: 12.5px; }
tbody tr:hover { background: rgba(99,102,241,.04); }
tbody tr { cursor: pointer; transition: background .15s; }
tbody tr:nth-child(even) { background: #fbfcfd; }

/* Status pills */
.status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-待返厂 { background: #fef3c7; color: #92400e; }
.status-返厂中 { background: #dbeafe; color: #1d4ed8; }
.status-维修中 { background: #fef3c7; color: #92400e; }
.status-物料采购中 { background: #ede9fe; color: #5b21b6; }
.status-待付款 { background: #fee2e2; color: #991b1b; }
.status-已付款 { background: #d1fae5; color: #065f46; }
.status-已完成 { background: #dcfce7; color: #166534; }
.status-已寄回 { background: #d1fae5; color: #065f46; }

/* Type tabs */
.type-tabs { display: flex; gap: 0; margin-bottom: 22px; background: #fff; border-radius: 10px; border: 1.5px solid var(--border); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.03); }
.type-tab { padding: 11px 26px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s ease; border-bottom: 2px solid transparent; letter-spacing: .2px; }
.type-tab:hover { background: #f8fafc; }
.type-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: linear-gradient(180deg,#eff6ff,#fff); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s ease; letter-spacing: .1px; }
.btn-primary { background: var(--blue-grad); color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,.25); }
.btn-primary:hover { box-shadow: 0 4px 16px rgba(37,99,235,.35); transform: translateY(-1px); }
.btn-success { background: var(--green-grad); color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,.25); }
.btn-success:hover { box-shadow: 0 4px 16px rgba(16,185,129,.35); transform: translateY(-1px); }
.btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 2px 8px rgba(37,99,235,.1); }
.btn-danger { background: #fff; color: var(--danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-upload { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background .15s; }
.btn-upload:hover { background: #2563eb; }

/* Form */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: .2px; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; font-family: inherit; transition: all .18s ease; background: #fff; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
.form-textarea { min-height: 60px; resize: vertical; }
.form-input[readonly] { background: #f8fafc; color: var(--text-secondary); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); backdrop-filter: blur(4px); z-index: 1000; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.2); animation: modalIn .25s ease; }
@keyframes modalIn { from { opacity:0; transform:translateY(-12px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 16px 16px 0 0; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 4px; border-radius: 6px; transition: all .15s; }
.modal-close:hover { background: #f1f5f9; color: var(--danger); }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: #fff; border-radius: 0 0 12px 12px; }

/* Detail view */
.detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.detail-id { font-size: 18px; font-weight: 700; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 14px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px; color: var(--text-secondary); }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.detail-field-label { font-size: 11px; color: var(--text-secondary); }
.detail-field-value { font-size: 14px; font-weight: 500; margin-top: 2px; }

/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: var(--border); }
.timeline-item { position: relative; padding-bottom: 16px; }
.timeline-item::before { content: ''; position: absolute; left: -20px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.timeline-item.done::before { background: var(--success); }
.timeline-item.current::before { background: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,.2); }
.timeline-time { font-size: 11px; color: var(--text-secondary); }
.timeline-content { font-size: 13px; margin-top: 2px; }

/* Filter bar */
.filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.filter-bar .form-input, .filter-bar .form-select { padding: 7px 10px; font-size: 13px; }
.search-input { min-width: 200px; }

/* Upload status */
.upload-status-bar { padding: 10px 24px; background: #fff; border-bottom: 1px solid var(--border); font-size: 13px; display: none; align-items: center; gap: 8px; border-radius: 0 0 10px 10px; margin-bottom: 12px; }
.upload-status-bar.show { display: flex; }
.upload-status-bar.success { color: var(--success); background: #f0fdf4; border-color: #bbf7d0; }
.upload-status-bar.error { color: var(--danger); background: #fef2f2; border-color: #fecaca; }
.upload-status-bar.info { color: var(--primary); background: #eff6ff; border-color: #bfdbfe; }

/* Year tabs */
.year-tabs { display: flex; gap: 0; margin-bottom: 16px; background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; width: fit-content; }
.year-tab { padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border-bottom: 2px solid transparent; }
.year-tab:hover { background: #f8fafc; }
.year-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #eff6ff; }

/* CRM Card view */
.crm-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
.crm-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 20px; cursor: pointer; transition: all .2s ease; box-shadow: 0 1px 4px rgba(0,0,0,.03); }
.crm-card:hover { border-color: #a5b4fc; box-shadow: 0 8px 28px rgba(99,102,241,.12); transform: translateY(-3px); }
.crm-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.crm-avatar { width: 44px; height: 44px; border-radius: 12px; background: var(--blue-grad); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; box-shadow: 0 2px 8px rgba(37,99,235,.25); }
.crm-card-name { font-size: 15.5px; font-weight: 700; color: var(--text); }
.crm-card-type { font-size: 11.5px; color: var(--text-secondary); font-weight: 500; }
.crm-card-info { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--text-secondary); }
.crm-card-info span { display: flex; align-items: center; gap: 6px; }
.crm-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.crm-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.tag-vip { background: #fef3c7; color: #92400e; }
.tag-key { background: #dbeafe; color: #1d4ed8; }
.tag-new { background: #dcfce7; color: #166534; }
.tag-catl { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }

/* 关联图谱（鱼骨图）：对接人 → 门店 → 电池 */
.rel-wrap { display: flex; flex-direction: column; gap: 20px; }
.rel-intro { background: linear-gradient(135deg,#eff6ff,#f0fdfa); border: 1.5px solid #bfdbfe; border-radius: 14px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(37,99,235,.06); }
.rel-intro-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; color: var(--text); }
.rel-intro-text { font-size: 12.5px; color: var(--text-secondary); line-height: 1.7; }
.rel-row { display: flex; align-items: stretch; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; position: relative; box-shadow: 0 2px 10px rgba(0,0,0,.04); transition: box-shadow .2s; }
.rel-row:hover { box-shadow: 0 6px 24px rgba(99,102,241,.08); }
.rel-head { flex: 0 0 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 2px dashed #cbd5e1; padding-right: 10px; }
.rel-brand { font-weight: 700; font-size: 14px; text-align: center; }
.rel-count { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.rel-spine { flex: 0 0 24px; position: relative; }
.rel-spine::before { content: ''; position: absolute; left: 50%; top: 8px; bottom: 8px; width: 3px; border-radius: 3px; background: linear-gradient(180deg,#3b82f6,#10b981); transform: translateX(-50%); }
.rel-branches { flex: 1; display: flex; flex-wrap: wrap; gap: 10px; padding: 0 14px; align-items: center; }
.rel-node { background: linear-gradient(135deg,#f8fafc,#fff); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 14px; min-width: 190px; max-width: 240px; box-shadow: 0 1px 4px rgba(0,0,0,.03); transition: all .18s; }
.rel-node:hover { border-color: #a5b4fc; box-shadow: 0 4px 12px rgba(99,102,241,.1); transform: translateY(-2px); }
.rel-store { font-weight: 700; font-size: 13px; color: var(--text); }
.rel-meta { margin: 6px 0 4px; font-size: 12px; }
.rel-contact.ok { color: #166534; }
.rel-contact.miss { color: #b45309; }
.rel-contact.miss a { color: var(--primary); text-decoration: underline; cursor: pointer; margin-left: 4px; }
.rel-addr { font-size: 11px; color: var(--text-secondary); }
.rel-tail { flex: 0 0 140px; display: flex; align-items: center; justify-content: center; border-left: 2px dashed #cbd5e1; padding-left: 10px; text-align: center; }
.rel-nobat { font-size: 11px; color: var(--text-secondary); }
.miss-field { color: #b45309; font-size: 13px; }
.miss-field a { color: var(--primary); text-decoration: underline; cursor: pointer; }

/* ===== 车型/电池总览条 ===== */
.store-overview { background: linear-gradient(135deg,#eff6ff 0%,#f0fdf4 50%,#fefce8 100%); border: 1px solid #bfdbfe; border-radius: 14px; padding: 18px 20px; margin-bottom: 18px; box-shadow: 0 2px 8px rgba(37,99,235,.06); }
.so-title { font-size: 14px; font-weight: 700; color: #1e3a8a; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.so-hint { font-size: 11px; color: #64748b; font-weight: 400; }
.so-chips { display: flex; gap: 10px; flex-wrap: wrap; }
.so-chip { display: flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; cursor: pointer; transition: all .2s ease; max-width: 320px; box-shadow: 0 1px 4px rgba(0,0,0,.03); }
.so-chip:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(37,99,235,.12); transform: translateY(-1px); }
.so-chip.active { border-color: var(--primary); background: linear-gradient(135deg,#dbeafe,#f0fdf4); }
.so-brand { font-size: 13px; font-weight: 600; color: #0f172a; white-space: nowrap; }
.so-battery { font-size: 11px; color: #047857; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.so-count { font-size: 11px; background: #e0f2fe; color: #0369a1; border-radius: 10px; padding: 1px 8px; white-space: nowrap; }
.so-title:hover { opacity: 0.85; }

/* 鱼骨图增强 */
.rel-node-ctp { border-left: 3px solid #f59e0b; }
.rel-node { cursor: pointer; transition: transform .15s ease; }
.rel-node:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }

/* 客户资源库（看板）鱼骨图 */
.kb-rel .rel-head { flex: 0 0 178px; }
.kb-rel .rel-brand { font-size: 13px; line-height: 1.4; }
.rel-node-situation { border-left: 3px solid #6366f1; min-width: 215px; }
.rel-situation { display: flex; flex-wrap: wrap; gap: 5px; margin: 6px 0 4px; }
.rel-situation .badge { font-size: 10.5px; padding: 2px 8px; }
.rel-badge-store { font-size:9px;background:#10b981;color:#fff;padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle; }
.rel-badge-ctp { font-size:9px;background:#f59e0b;color:#fff;padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle; }

/* 看板卡片编辑按钮 */
.kb-rel .rel-row .kb-edit-btn {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px;
  border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--text-secondary);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all .2s ease;
  z-index: 5; box-shadow: 0 1px 6px rgba(0,0,0,.08);
}
.kb-rel .rel-row:hover .kb-edit-btn { opacity: 1; }
.kb-rel .rel-row .kb-edit-btn:hover {
  background: var(--primary); color: #fff; border-color: var(--primary);
  transform: scale(1.1);
}
.rel-phone { font-size:10px;color:var(--text-secondary);margin-left:6px; }
.rel-bat { margin-top:4px; }

/* 鱼骨图对接信息节点（对接人 + 终端客户分离） */
.kb-contact-row { display: flex; align-items: center; gap: 6px; padding: 6px 0 2px; border-bottom: 1px dashed #e2e8f0; margin-bottom: 6px; }
.kb-contact-label { font-size: 11px; color: #6b7280; white-space: nowrap; }
.kb-cust-section { margin-top: 4px; }
.kb-cust-header { font-size: 11.5px; font-weight: 600; color: #4b5563; margin-bottom: 4px; }
.kb-cust-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; }
.kb-cust-name { font-weight: 500; color: #1f2937; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kb-cust-phone { font-size: 10.5px; color: #6366f1; background: #eef2ff; padding: 1px 7px; border-radius: 8px; white-space: nowrap; }

/* ===== 电池配置药丸 ===== */
.battery-pill { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg,#0ea5e9,#10b981); color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.battery-pill.sm { font-size: 11px; padding: 2px 8px; }
.brand-badge { display: inline-flex; align-items: center; gap: 4px; background: #eef2ff; color: #4338ca; font-size: 12px; padding: 2px 9px; border-radius: 12px; white-space: nowrap; }

/* ===== 按车型分组 ===== */
.group-caption { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; font-weight: 600; }
.brand-group { margin-bottom: 24px; }
.brand-header { display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: linear-gradient(135deg,#1e293b,#334155); border-radius: 12px 12px 0 0; color: #fff; flex-wrap: wrap; box-shadow: 0 2px 8px rgba(15,23,42,.2); }
.brand-name { font-size: 17px; font-weight: 800; letter-spacing: .3px; }
.brand-count { font-size: 12px; color: #94a3b8; margin-left: auto; background: rgba(255,255,255,.1); padding: 3px 10px; border-radius: 8px; }

/* 门店卡片强调 */
.store-card { border-left: 4px solid #10b981; box-shadow: 0 2px 8px rgba(16,185,129,.06); }
.crm-card-battery { margin: 10px 0 5px; }
.crm-card-battery .battery-pill { max-width: 100%; }

/* Customer detail panel */
.customer-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.follow-record { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.follow-record:last-child { border-bottom: none; }
.follow-date { font-size: 11px; color: var(--text-secondary); min-width: 80px; }
.follow-content { font-size: 13px; flex: 1; }

/* View toggle */
.view-toggle { display: flex; gap: 3px; background: #e2e8f0; border-radius: 10px; padding: 3px; }
.view-toggle-btn { padding: 7px 14px; font-size: 12.5px; border: none; background: transparent; cursor: pointer; border-radius: 7px; transition: all .2s ease; font-weight: 500; color: var(--text-secondary); }
.view-toggle-btn:hover { background: rgba(255,255,255,.6); }
.view-toggle-btn.active { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.1); font-weight: 600; color: var(--primary-deep); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 180px; font-size: 12px; }
  .sidebar-brand { font-size: 13px; padding: 8px; }
  .sidebar-brand small { font-size: 9px; }
  .nav-item { padding: 6px 8px; font-size: 11px; }
  .nav-item .icon { font-size: 13px; }
  .nav-section { font-size: 9px; padding: 5px 8px 2px; }
  .nav-badge { font-size: 9px; padding: 1px 4px; }
  .main { margin-left: 180px; padding: 12px; }
  .form-grid { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: flex-start; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .customer-detail { grid-template-columns: 1fr; }
  .crm-cards { grid-template-columns: 1fr; }
}

/* Print */
@media print {
  .sidebar, .btn, .filter-bar, .pipeline, .type-tabs, .year-tabs { display: none !important; }
  .main { margin-left: 0; }
}

  return getDefaultData();
}

// 将宁德时代门店明细合并进客户资料库
// 按唯一 id 去重（同一体验中心可承载多个品牌，名称会重复但 id 唯一），保证幂等且不误删同名不同品牌门店
function mergeStoreSeedInto(app) {
  if (typeof STORE_SEED === 'undefined' || !Array.isArray(STORE_SEED)) return;
  app.customers = app.customers || [];
  const ids = new Set(app.customers.map(c => (c.id || '').trim()).filter(Boolean));
  let added = 0;
  STORE_SEED.forEach(s => {
    const key = (s.id || '').trim();
    if (key && !ids.has(key)) {
      app.customers.push(JSON.parse(JSON.stringify(s)));
      ids.add(key);
      added++;
    }
  });
  return added;
}

// 将保外业务台帐（BAOWAI_SEED）与其派生客户（BAOWAI_CUSTOMERS）合并进应用
function mergeBaoWaiIntoApp(app) {
  if (typeof BAOWAI_SEED !== 'undefined' && Array.isArray(BAOWAI_SEED)) {
    app.baoWaiOrders = (app.baoWaiOrders && app.baoWaiOrders.length) ? app.baoWaiOrders : JSON.parse(JSON.stringify(BAOWAI_SEED));
  } else {
    app.baoWaiOrders = app.baoWaiOrders || [];
  }
  if (typeof BAOWAI_CUSTOMERS !== 'undefined' && Array.isArray(BAOWAI_CUSTOMERS)) {
    app.customers = app.customers || [];
    const ids = new Set(app.customers.map(c => (c.id || '').trim()).filter(Boolean));
    BAOWAI_CUSTOMERS.forEach(s => {
      const key = (s.id || '').trim();
      if (key && !ids.has(key)) { app.customers.push(JSON.parse(JSON.stringify(s))); ids.add(key); }
    });
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let APP = loadData();

function genId(prefix) {
  APP.idCounters[prefix]++;
  saveData(APP);
  const n = String(APP.idCounters[prefix]).padStart(6, '0');
  return prefix === 'rp' ? `RP-${n}` : `CR-${n}`;
}

function getFilteredRepairs() {
  let filtered = APP.repairOrders;
  
  // Year filter
  if (rpFilterYear !== '全部') {
    const yearPrefix = rpFilterYear === '25年度' ? '2025' : '2026';
    filtered = filtered.filter(o => {
      const dateStr = o.returnFactoryDate || o.createDate || '';
      return dateStr.startsWith(yearPrefix);
    });
  }
  
  // Type filter
  if (rpFilterType) filtered = filtered.filter(o => o.businessType === rpFilterType);
  
  // Status filter
  if (rpFilterStatus) filtered = filtered.filter(o => o.status === rpFilterStatus);
  
  // Search
  if (rpSearchText) {
    const t = rpSearchText.toLowerCase();
    filtered = filtered.filter(o => (
      (o.workOrderNo||'') + (o.customer||'') + (o.plateNumber||'') + 
      (o.contactPerson||'') + (o.vin||'') + (o.barcode||'')
    ).toLowerCase().includes(t));
  }
  
  return filtered;
}

function saveRepair(editId) {
  const data = {

    workOrderNo: document.getElementById('f_rp_workOrderNo').value,
    fieldOrder: document.getElementById('f_rp_fieldOrder').value,
    reportStatus: document.getElementById('f_rp_reportStatus').value,
    businessType: document.getElementById('f_rp_businessType').value,
    customer: document.getElementById('f_rp_customer').value,
    contactPerson: document.getElementById('f_rp_contactPerson').value,
    plateNumber: document.getElementById('f_rp_plateNumber').value,
    vin: document.getElementById('f_rp_vin').value,
    barcode: document.getElementById('f_rp_barcode').value,
    pn: document.getElementById('f_rp_pn').value,
    returnFactoryDate: document.getElementById('f_rp_returnFactoryDate').value,
    repairCompleteDate: document.getElementById('f_rp_repairCompleteDate').value,
    returnDate: document.getElementById('f_rp_returnDate').value,
    materialPurchaseDate: document.getElementById('f_rp_materialPurchaseDate').value,
    materialArrivalDate: document.getElementById('f_rp_materialArrivalDate').value,
    repairPerson: document.getElementById('f_rp_repairPerson').value,
    status: document.getElementById('f_rp_status').value,
    progress: document.getElementById('f_rp_progress').value,
    progress2: document.getElementById('f_rp_progress2').value,
  };

  if(!data.workOrderNo || !data.customer) {
    alert('请填写必填项：工单号、客户');
    return;
  }

  if(editId) {
    const idx = APP.repairOrders.findIndex(o => o.id === editId);
    if(idx >= 0) Object.assign(APP.repairOrders[idx], data);
  } else {
    data.id = genId('rp');
    data.createDate = todayStr();
    APP.repairOrders.push(data);
    
    // Auto-create customer if not exists
    autoCreateCustomer(data.customer, data.contactPerson);
  }
  saveData(APP);
  closeModal();
  renderPage();
}

function buildTimeline(o) {
  const steps = [
    { label: '返厂', date: o.returnFactoryDate },
    { label: '物料采购', date: o.materialPurchaseDate },
    { label: '物料到货', date: o.materialArrivalDate },
    { label: '维修完成', date: o.repairCompleteDate },
    { label: '返回客户', date: o.returnDate },
  ];
  
  return '<div class="timeline">' + steps.map((s, i) => {
    const done = !!s.date;
    const isCurrent = done && (i === steps.length-1 || !steps[i+1].date);
    return `<div class="timeline-item ${done?'done':''} ${isCurrent?'current':''}">
      <div class="timeline-time">${s.date||'待完成'}</div>
      <div class="timeline-content">${s.label}</div>
    </div>`;
  }).join('') + '</div>';
}

function renderStoreOverview() {
  const map = new Map();
  APP.customers.forEach(c => {
    if (!c.isStore) return;
    const b = c.vehicleBrand || '未分类';

    map.get(b).stores++;

  const arr = [...map.values()].sort((a,b)=>b.stores-a.stores);
  const totalStores = arr.reduce((s,o)=>s+o.stores,0);

// 关联关系视图（鱼骨图风格）：展示所有客户（门店+CTP维修），按品牌/车型串联
function renderCRMRelation(customers) {
  const esc = s => (s==null ? '' : String(s)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  // 合并两类：门店(isStore) + CTP维修客户，按 id 去重优先保留门店版
  const allMap = new Map();
  customers.forEach(c => {
    const existing = allMap.get(c.id);
    if (!existing || (c.isStore && !existing.isStore)) allMap.set(c.id, c);
  });
  const list = [...allMap.values()];
  if (!list.length) return '<div class="card" style="text-align:center;color:var(--text-secondary);padding:40px">暂无客户数据</div>';
  // 按品牌分组
  const map = new Map();
  list.forEach(c => {
    const b = c.vehicleBrand || '未分类车型';
    if (!map.has(b)) map.set(b, []);
    map.get(b).push(c);
  });
  const arr = [...map.entries()].sort((a,b)=>b[1].length-a[1].length);
  const totalContact = list.filter(c=>c.contact || c.contactPerson).length;
  const storeItems = list.filter(c=>c.isStore);
  const ctpItems = list.filter(c=>!c.isStore);
  const allBatteries = new Set();
  list.forEach(c => { if(c.batteryModel) allBatteries.add(c.batteryModel); });

  return `
    <div class="rel-wrap">
      <div class="rel-intro">
        <div class="rel-intro-title">🔗 客户资源关联图谱（鱼骨图）</div>
        <div class="rel-intro-text">按 <strong>品牌 / 车型</strong> 串联所有资源：<strong>${list.length}</strong> 条记录（门店 ${storeItems.length} 家 + 维修客户 ${ctpItems.length} 家）· 已填对接人 <strong>${totalContact}</strong> 条 · 涉及电池型号 <strong>${allBatteries.size}</strong> 种。点击节点查看详情。</div>
      </div>
      ${arr.map(([brand, items]) => {
        const bats = [...new Set(items.map(c=>c.batteryModel).filter(Boolean))];
        const storeCnt = items.filter(c=>c.isStore).length;
        const ctpCnt = items.filter(c=>!c.isStore).length;
        return `
        <div class="rel-row">
          <div class="rel-head">
            <div class="rel-brand">🚗 ${esc(brand)}</div>
            <div class="rel-count">${items.length} 条 ${storeCnt?storeCnt+'门店':''} ${ctpCnt?ctpCnt+'维修':''}</div>
          </div>
          <div class="rel-spine"></div>
          <div class="rel-branches">
            ${items.map(c => {
              const ct = c.contact || c.contactPerson || '';
              const isS = c.isStore;
              return `
              <div class="rel-node ${isS?'':'rel-node-ctp'}" onclick="viewCustomer('${c.id}')" title="点击查看详情">
                <div class="rel-store">${esc(c.name||'-')} ${isS?'<span class="rel-badge-store">门店</span>':'<span class="rel-badge-ctp">维修</span>'}</div>
                <div class="rel-meta">
                  ${ct
                    ? `<span class="rel-contact ok">👤 ${esc(ct)}</span>`
                    : `<span class="rel-contact miss">👤 待补充</span>`}
                  ${c.phone ? `<span class="rel-phone">📞 ${esc(c.phone)}</span>` : ''}
                </div>
                <div class="rel-addr">📍 ${esc(c.address||'-')}</div>
                ${c.batteryModel ? `<div class="rel-bat"><span class="battery-pill sm">🔋 ${esc(c.batteryModel)}</span></div>` : ''}
              </div>`;
            }).join('')}
          </div>
          <div class="rel-tail">
            ${bats.length ? bats.map(b => `<span class="battery-pill sm">🔋 ${esc(b)}</span>`).join('') : '<span class="rel-nobat">—</span>'}
          </div>
        </div>`;
      }).join('')}

  `;
}

function getFilteredCustomers() {
  let filtered = APP.customers;
  if (crmSearchText) {
    const t = crmSearchText.toLowerCase();
    filtered = filtered.filter(c => (
      (c.name||'') + '|' + (c.contact||'') + '|' + (c.phone||'') + '|' + (c.mobile||'') + '|' + (c.address||'') + '|' + (c.vehicleBrand||'') + '|' + (c.batteryModel||'') + '|' + (c.customerType||'')
    ).toLowerCase().includes(t));
  }
  if (crmFilterTag) filtered = filtered.filter(c => (c.tags||[]).includes(crmFilterTag));
  if (crmFilterType) filtered = filtered.filter(c => c.region === crmFilterType);
  if (crmFilterBrand) filtered = filtered.filter(c => (c.vehicleBrand||'').includes(crmFilterBrand));
  if (crmFilterBattery) filtered = filtered.filter(c => (c.batteryModel||'') === crmFilterBattery);
  if (crmFilterCustomerType) filtered = filtered.filter(c => c.customerType === crmFilterCustomerType);
  if (crmFilterContact) filtered = filtered.filter(c => (c.contact||'') === crmFilterContact || (c.contactPerson||'') === crmFilterContact);
  return filtered;
}

function getUniqueBatteries() {
  const set = new Set();
  APP.customers.forEach(c => { if (c.batteryModel) set.add(c.batteryModel); });
  return [...set].sort();

function getUniqueRegions() {
  const regions = new Set(APP.customers.map(c => c.region).filter(Boolean));

function getUniqueBrands() {
  const brands = new Set();
  APP.customers.forEach(c => {
    if (c.vehicleBrand) {
      c.vehicleBrand.split(/[,，/、\s]+/).forEach(b => {
        const bb = b.trim();
        if (bb) brands.add(bb);
      });
    }
  });
  return [...brands].sort();
}

function getRelatedOrderCount(customerName) {
  if(!customerName) return 0;
  let n = APP.repairOrders.filter(o => o.customer && o.customer.includes(customerName)).length;
  if (APP.baoWaiOrders) n += APP.baoWaiOrders.filter(o => (o.signedCustomer||'') === customerName).length;
  return n;
}

function getLastFollowDate(customer) {
  const follows = customer.followUps || [];
  if(!follows.length) return '-';
  return follows[follows.length-1].date || '-';
}

// 导出客户资源管理中的全部客户档案为 CSV（含保外/返修关联工单数）
function exportCustomersCSV() {
  const rows = (APP.customers || []);
  const headers = ['客户名称','联系人','电话','区域','客户类型','车型/品牌','电池型号','保修状态','标签','关联工单数','是否保外','创建日期','地址'];
  const data = rows.map(c => {
    const ro = (APP.repairOrders || []).filter(o => (o.customer || '') === c.name).length;
    const bw = (APP.baoWaiOrders || []).filter(o => (o.signedCustomer || '') === (c.baoWaiRef || c.name)).length;
    const isBw = !!(c.baoWaiRef || (c.tags || []).includes('保外业务'));
    return [c.name||'', c.contact||'', c.phone||'', c.region||'', c.customerType||'', c.vehicleBrand||'', c.batteryModel||'', c.warrantyStatus||'', (c.tags||[]).join('/'), ro + bw, isBw ? '是' : '否', c.createDate||'', c.address||''];
  });
  const csv = '﻿' + [headers.join(','), ...data.map(r => r.map(x => `"${String(x==null?'':x).replace(/"/g,'""')}"`).join(','))].join('\n');
  downloadCSV(csv, `客户资料库_${todayStr()}.csv`);
}

function saveCustomer(editId) {
  const tags = [];
  if(document.getElementById('f_cr_tag_new')?.checked) tags.push('新客');
  if(document.getElementById('f_cr_tag_old')?.checked) tags.push('老客');
  if(document.getElementById('f_cr_tag_key')?.checked) tags.push('重点客户');
  if(document.getElementById('f_cr_tag_vip')?.checked) tags.push('VIP');
  
  const data = {
    name: document.getElementById('f_cr_name').value,
    contact: document.getElementById('f_cr_contact').value,
    phone: document.getElementById('f_cr_phone').value,
    email: document.getElementById('f_cr_email')?.value || '',
    address: document.getElementById('f_cr_address').value,
    region: document.getElementById('f_cr_region').value,
    customerType: document.getElementById('f_cr_customerType').value,
    vehicleBrand: document.getElementById('f_cr_vehicleBrand')?.value || '',
    batteryModel: document.getElementById('f_cr_batteryModel')?.value || '',
    warrantyStatus: document.getElementById('f_cr_warrantyStatus')?.value || '保内',
    tags: tags,
    remark: document.getElementById('f_cr_remark').value,
  };

  if(!data.name) {
    alert('请填写客户名称');
    return;
  }

  if(editId) {
    const idx = APP.customers.findIndex(o => o.id === editId);
    if(idx >= 0) Object.assign(APP.customers[idx], data);
  } else {
    data.id = genId('cr');
    data.followUps = [];
    data.createDate = todayStr();
    APP.customers.push(data);
  }
  saveData(APP);
  closeModal();
  renderPage();
}

function deleteCustomer(id) {
  if(!confirm('确认删除此客户？')) return;
  APP.customers = APP.customers.filter(o => o.id !== id);

}

function addFollowUp(customerId) {
  const content = prompt('请输入跟进内容：');
  if(!content) return;
  
  const c = APP.customers.find(x => x.id === customerId);
  if(!c) return;
  
  if(!c.followUps) c.followUps = [];
  c.followUps.push({ date: todayStr(), content: content });
  saveData(APP);
  viewCustomer(customerId);
}

// Auto-create customer from repair order
function autoCreateCustomer(customerName, contactPerson, repairData) {
  if(!customerName) return;
  const exists = APP.customers.find(c => c.name === customerName);
  if(!exists) {
    // Extract vehicle brand from customer name (e.g., "汇邦新能-理想R2" -> "理想")
    let vehicleBrand = '';
    if (customerName.includes('-')) {
      vehicleBrand = customerName.split('-')[1] || '';
      // Remove model suffix like R1, R2
      vehicleBrand = vehicleBrand.replace(/R\d+$/, '').trim();
    }
    // Extract battery model from PN field
    let batteryModel = '';
    if (repairData && repairData.pn) {
      batteryModel = repairData.pn.split('-')[0] || '';
    }
    // Determine warranty status
    let warrantyStatus = (repairData && repairData.businessType) || '保内';
    
    APP.customers.push({
      id: genId('cr'),
      name: customerName,
      contact: contactPerson || '',
      phone: '',
      email: '',
      address: '',
      region: '',
      customerType: '中小客户',
      vehicleBrand: vehicleBrand,
      batteryModel: batteryModel,
      warrantyStatus: warrantyStatus,
      tags: ['新客'],
      followUps: [],
      createDate: todayStr(),
      remark: '从CTP返修数据自动创建'
    });
  }
}

  barcode:'',pn:'',returnFactoryDate:'',repairCompleteDate:'',returnDate:'',
  materialPurchaseDate:'',materialArrivalDate:'',repairPerson:'',

function showUploadStatus(msg, type) {
  const el = document.getElementById('uploadStatusBar');
  if (!el) return;
  el.className = 'upload-status-bar show ' + type;
  el.innerHTML = msg;
  if (type === 'success') setTimeout(() => { el.className = 'upload-status-bar show info'; }, 8000);
}

function detectRepairSheet(headers) {
  const repairKeys = ['工单号','返修地址','客户','返厂时间','维修人'];
  let score = 0;
  headers.forEach(h => { if (repairKeys.includes(h.trim())) score++; });
  return score >= 2;
}

function mapRepairRow(rawRow) {
  const obj = {...RP_DEFAULTS};
  for (const [cnHeader, jsKey] of Object.entries(RP_COLUMN_MAP)) {
    if (rawRow[cnHeader] !== undefined && rawRow[cnHeader] !== null) {
      let val = rawRow[cnHeader];
      if (val instanceof Date) {
        const y = val.getFullYear();
        const m = String(val.getMonth()+1).padStart(2,'0');
        const d = String(val.getDate()).padStart(2,'0');
        val = `${y}-${m}-${d}`;
      } else {
        val = String(val).trim();
      }
      obj[jsKey] = val;
    }
  }
  return obj;
}

function handleExcelUpload(input) {
  const file = input.files[0];
  if (!file) return;

  showUploadStatus('⏳ 正在读取 <b>' + file.name + '</b> ...', 'info');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array', cellDates:true});

      let totalImported = 0;

      for (const sheetName of workbook.SheetNames) {
        const sheet = workbook.Sheets[sheetName];
        let jsonData = XLSX.utils.sheet_to_json(sheet, {defval:''});
        if (!jsonData.length) continue;

        // Check if headers are in first row
        let headers = Object.keys(jsonData[0]);
        
        // If headers don't match repair keys, check if row 2 has headers
        // (some sheets have title in row 1, headers in row 2)
        if (!detectRepairSheet(headers)) {
          // Try to find header row by looking for repair keys in subsequent rows
          let headerRowIndex = -1;
          for (let i = 0; i < Math.min(5, jsonData.length); i++) {
            const rowKeys = Object.keys(jsonData[i]);
            if (detectRepairSheet(rowKeys)) {
              headerRowIndex = i;
              break;
            }
          }
          // If not found in json data, check raw sheet cells
          if (headerRowIndex === -1) {
            const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
            for (let r = range.s.r; r <= Math.min(range.s.r + 5, range.e.r); r++) {
              const rowHeaders = [];
              for (let c = range.s.c; c <= range.e.c; c++) {
                const cell = sheet[XLSX.utils.encode_cell({r, c})];
                if (cell && cell.v) rowHeaders.push(String(cell.v).trim());
              }
              if (detectRepairSheet(rowHeaders)) {
                // Re-parse with this row as header
                jsonData = XLSX.utils.sheet_to_json(sheet, {defval:'', header: 1, raw: false});
                const headerRow = jsonData[r];
                const dataRows = jsonData.slice(r + 1);
                jsonData = dataRows.map(row => {
                  const obj = {};
                  headerRow.forEach((h, idx) => {
                    if (h && row[idx] !== undefined) obj[h] = row[idx];
                  });
                  return obj;
                });
                headers = headerRow.map(h => String(h).trim());
                break;
              }
            }
          }
        }
        
        if (!detectRepairSheet(headers)) continue;
          jsonData.forEach(row => {
            const mapped = mapRepairRow(row);
            if (!mapped.workOrderNo) return;
            
            // Auto-detect business type
            if (!mapped.businessType || mapped.businessType === '保内') {
              const progressStr = (mapped.progress || '').toLowerCase();
              if (progressStr.includes('保外') || progressStr.includes('付费')) {
                mapped.businessType = '保外';
              }
            }
            
            // Auto-detect status from dates and progress
            if (!mapped.status || mapped.status === '待返厂') {
              if (mapped.returnDate) mapped.status = '已寄回';
              else if (mapped.repairCompleteDate) mapped.status = '已完成';
              else if (mapped.materialArrivalDate) mapped.status = '维修中';
              else if (mapped.materialPurchaseDate) mapped.status = '物料采购中';
              else if (mapped.returnFactoryDate) mapped.status = '返厂中';
            }
            
            mapped.id = genId('rp');
            mapped.createDate = todayStr();
            APP.repairOrders.push(mapped);
            totalImported++;
            
            // Auto-create customer with repair data
            autoCreateCustomer(mapped.customer, mapped.contactPerson, mapped);
          });
      }

      saveData(APP);
      
      if (totalImported > 0) {
        showUploadStatus('✅ 成功导入 <b>' + totalImported + '</b> 条返修记录', 'success');
      } else {
        showUploadStatus('⚠️ 未检测到返修数据，请确认Excel表头包含：工单号、客户、返厂时间等字段', 'error');
      }
      
      renderPage();
      input.value = '';
    } catch(err) {
      showUploadStatus('❌ 文件解析失败：' + err.message, 'error');
      input.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

let kbSearch='', kbContact='', kbCity='', kbStatus='', kbPType='';

// 解析保外工单中的最新更新日期（取 requestDate / repairDoneDate / invoiceDate / receivableDate 的最大值）
function bwParseDate(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  if (!m) return null;
  return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
}
function bwLatestDate(o) {
  const ds = [o.requestDate, o.repairDoneDate, o.invoiceDate, o.receivableDate].map(bwParseDate).filter(Boolean);
  return ds.length ? ds.reduce((a,b)=> a>b?a:b) : null;
}

function kbFiltered() {
  const all = APP.baoWaiOrders || [];
  return all.filter(o => {
    if (kbContact && (o.contactPerson||'')!==kbContact) return false;
    if (kbCity && (o.city||'')!==kbCity) return false;
    if (kbStatus && (o.repairStatus||'')!==kbStatus) return false;
    if (kbPType && (o.productType||'')!==kbPType) return false;
    if (kbSearch) {
      const t = kbSearch.toLowerCase();
      const hay = ((o.signedCustomer||'')+(o.customerName||'')+(o.customerPhone||'')+(o.plateNumber||'')+(o.pn||'')).toLowerCase();
      if (!hay.includes(t)) return false;
    }
    return true;
  });
}

function kbAggregate(filtered) {
  const map = new Map();
  filtered.forEach(o => {
    const k = o.signedCustomer || '未命名客户';
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(o);
  });
  return [...map.entries()].map(([name, os]) => {
    const sum = f => os.reduce((s,o)=>s+(parseFloat(o[f])||0),0);
    const statusDist = {};
    os.forEach(o => { const s=o.repairStatus||'未填'; statusDist[s]=(statusDist[s]||0)+1; });
    return {
      name, orders: os,
      count: os.length,
      quoteTotal: sum('quoteTotal'),
      received: sum('received'),
      unreceived: sum('unreceived'),
      grossProfit: sum('grossProfit'),
      city: mostCommon(os.map(o=>o.city)),
      contact: mostCommon(os.map(o=>o.contactPerson)),
      statusDist,
      customers: [...new Set(os.map(o=>o.customerName).filter(Boolean))],
      phones: [...new Set(os.map(o=>o.customerPhone).filter(Boolean))],
      // 终端客户详情：姓名 → 电话列表（一对多，用于鱼骨图逐条展示）
      customerDetails: (() => {
        const m = new Map();
        os.forEach(o => {
          const cn = (o.customerName||'').trim(); const cp = (o.customerPhone||'').trim();
          if (!cn) return;
          if (!m.has(cn)) m.set(cn, []);
          if (cp && !m.get(cn).includes(cp)) m.get(cn).push(cp);
        });
        return [...m.entries()].map(([name, phs]) => ({ name, phones: phs }));
      })(),
      lastUpdate: (() => { let mx=null; os.forEach(o=>{const d=bwLatestDate(o); if(d&&(mx===null||d>mx))mx=d;}); return mx; })(),
    };
  }).sort((a,b)=>b.quoteTotal-a.quoteTotal);
}

  const csv = '﻿' + [headers.join(','), ...data.map(r => r.map(c => `"${String(c==null?'':c).replace(/"/g,'""')}"`).join(','))].join('\n');
  downloadCSV(csv, `保外工单明细_${todayStr()}.csv`);
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

// ===== 看板 Excel 导入：去重 + 增量匹配 =====

// 中文表头 → baoWaiOrders 字段映射（支持多种常见写法）
const KB_IMPORT_MAP = {
  '月份':'month','月':'month',
  '签约客户':'signedCustomer','门店':'signedCustomer','客户名称':'signedCustomer','签约门店':'signedCustomer','服务门店':'signedCustomer',
  '城市':'city','地区':'city','区域':'city',
  '对接人':'contactPerson','对接联系人':'contactPerson','业务对接人':'contactPerson','联系人':'contactPerson',
  '客户姓名':'customerName','终端客户':'customerName','车主姓名':'customerName','客户':'customerName',
  '客户电话':'customerPhone','终端电话':'customerPhone','车主电话':'customerPhone','联系电话':'customerPhone',
  '车牌':'plateNumber','车牌号':'plateNumber','车辆牌照':'plateNumber',
  '车架号':'vin','VIN':'vin','车架号码':'vin','VIN码':'vin',
  'PN':'pn','配件PN':'pn','物料编码':'pn','零件号':'pn',
  '产品类型':'productType','产品':'productType','车型':'productType',
  '项目类型':'projectType','项目/需求':'projectType','需求描述':'projectType','维修项目':'projectType',
  '维修状态':'repairStatus','状态':'repairStatus','工单状态':'repairStatus','报单状态':'repairStatus',
  '需求描述':'repairDesc','问题描述':'repairDesc','故障描述':'repairDesc','备注':'repairDesc','维修描述':'repairDesc',
  '最新更新':'latestUpdate','更新时间':'latestUpdate','最后更新':'latestUpdate',
  '维修工程师':'engineer','工程师':'engineer','维修人':'engineer',
  '报价总额':'quoteTotal','报价':'quoteTotal','金额':'quoteTotal','合计金额':'quoteTotal',
  '已回款':'received','已收款':'received','实收金额':'received',
  '未回款':'unreceived','未收金额':'unreceived','欠款':'unreceived',
  '开票金额':'invoiceAmount','发票金额':'invoiceAmount',
  '毛利':'grossProfit'
};

function importBaoWaiExcel(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // reset for re-upload same file

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      if (!sheet) { alert('无法读取 Excel 内容'); return; }

      let jsonData = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if (!jsonData.length) { alert('Excel 无数据行'); return; }

      // 探测表头行
      const headers = Object.keys(jsonData[0]);
      let headerRowIdx = 0;
      let matchedKeys = headers.filter(h => KB_IMPORT_MAP[String(h).trim()]);
      if (matchedKeys.length < 3) {
        // 尝试找真正的表头行
        for (let i = 1; i < Math.min(6, jsonData.length); i++) {
          const hk = Object.keys(jsonData[i]).filter(h => KB_IMPORT_MAP[String(h).trim()]);
          if (hk.length > matchedKeys.length) { matchedKeys = hk; headerRowIdx = i; }
        }
        // 如果还是找不到，尝试 raw 解析找中文表头
        if (matchedKeys.length < 3) {
          const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
          for (let r = range.s.r; r <= Math.min(range.s.r + 5, range.e.r); r++) {
            const rh = [];
            for (let c = range.s.c; c <= range.e.c; c++) {
              const cell = sheet[XLSX.utils.encode_cell({r, c})];
              rh.push(cell ? String(cell.v).trim() : '');
            }
            const mk = rh.filter(h => KB_IMPORT_MAP[h]);
            if (mk.length > matchedKeys.length) { matchedKeys = mk; headerRowIdx = r; }
          }
          if (headerRowIdx > 0) {
            const rawRows = XLSX.utils.sheet_to_json(sheet, {defval:'', header:1, raw:false});
            const hRow = rawRows[headerRowIdx];
            jsonData = rawRows.slice(headerRowIdx + 1).map(row => {
              const obj = {};
              hRow.forEach((h, idx) => { if (h && row[idx] !== undefined && row[idx] !== '') obj[String(h).trim()] = row[idx]; });
              return obj;
            });
          }
        }
      }

      // 映射每行为 baoWaiOrder 对象
      const imported = [];
      jsonData.forEach((rawRow, idx) => {
        const obj = {};
        let hasData = false;
        for (const [cnHeader, jsKey] of Object.entries(KB_IMPORT_MAP)) {
          let val = rawRow[cnHeader];
          if (val === undefined || val === null) continue;
          val = String(val).trim();
          if (val === '') continue;
          hasData = true;
          // 数值字段转换
          if (['quoteTotal','received','unreceived','invoiceAmount','grossProfit'].includes(jsKey)) {
            const n = parseFloat(String(val).replace(/[,，¥￥]/g,''));
            if (!isNaN(n)) obj[jsKey] = n; else obj[jsKey] = val;
          } else {
            obj[jsKey] = val;
          }
        }
        if (hasData) imported.push(obj);
      });

      if (!imported.length) { alert('未识别到有效数据列（需包含：月份/签约客户/对接人/客户姓名/车牌/车架号/PN 等字段）'); return; }

      showBaoWaiImportPreview(imported);
    } catch(err) {
      console.error('importBaoWaiExcel error:', err);
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// 计算复合匹配键（用于去重）
function bwMatchKey(o) {
  return [
    (o.vin||'').toUpperCase().replace(/\s/g,''),
    (o.signedCustomer||'').trim(),
    (o.customerName||'').trim(),
    (o.plateNumber||'').trim()
  ].join('|');
}

// 预览增量对比结果
function showBaoWaiImportPreview(imported) {
  const existing = APP.baoWaiOrders || [];
  const existMap = new Map(); // matchKey → index in existing
  existing.forEach((o, i) => { existMap.set(bwMatchKey(o), i); });

  let added = [], updated = [];
  imported.forEach(nrow => {
    const key = bwMatchKey(nrow);
    const ei = existMap.get(key);
    if (ei !== undefined) {
      // 找到已有记录 → 增量合并（空值不覆盖）
      const old = existing[ei];
      const changes = [];
      for (const [k, v] of Object.entries(nrow)) {
        if (!(k in old) || old[k] === '' || old[k] === null || old[k] === undefined) {
          changes.push({ field: k, from: (old[k]||'—'), to: v });
        } else if (String(old[k]) !== String(v)) {
          changes.push({ field: k, from: old[k], to: v });
        }
      }
      if (changes.length) updated.push({ record: old, changes, key });
    } else {
      added.push(nrow);
    }
  });

  // 去重：added 内部也按 matchKey 去重
  const seenKeys = new Set();
  const dedupAdded = [];
  added.forEach(row => {
    const k = bwMatchKey(row);
    if (seenKeys.has(k)) return;
    seenKeys.add(k);
    dedupAdded.push(row);
  });
  added = dedupAdded;

  const esc2 = s => (s==null?'':String(s)).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" }[m]));

  const html = `
    <div class="modal-header">
      <div class="modal-title">📥 保外工单导入预览</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" style="max-height:65vh;overflow-y:auto">
      <div style="background:linear-gradient(135deg,#eff6ff,#f0fdfa);border-radius:12px;padding:16px;margin-bottom:16px">
        <div style="display:flex;gap:20px;font-size:14px">
          <div><b style="color:#166534">✅ 新增</b> <span style="font-size:18px;color:#166534;font-weight:700">${added.length}</span> 条</div>
          <div><b style="color:#b45309">🔄 更新</b> <span style="font-size:18px;color:#b45309;font-weight:700">${updated.length}</span> 条</div>
          <div><b style="color:#6b7280">📊 总读取</b> ${imported.length} 条（去重后）</div>
        </div>
      </div>

      ${added.length ? `
      <div style="margin-bottom:16px">
        <div style="font-weight:600;margin-bottom:8px;color:#166534">📥 新增记录 (${added.length}条)</div>
        <div style="max-height:200px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:10px">
          <table style="width:100%;font-size:12px">
            <thead><tr style="background:#f9fafb"><th>#</th><th>门店</th><th>客户</th><th>车牌</th><th>车架号</th><th>状态</th></tr></thead>
            <tbody>${added.slice(0,30).map((r,i)=>`<tr><td>${i+1}</td><td>${esc2(r.signedCustomer)}</td><td>${esc2(r.customerName)}</td><td>${esc2(r.plateNumber)}</td><td style="font-size:11px">${esc2(r.vin)}</td><td>${esc2(r.repairStatus||'-')}</td></tr>`).join('')}
            </tbody>
          </table>
          ${added.length > 30 ? `<div style="text-align:center;padding:6px;color:var(--text-secondary);font-size:12px">... 还有 ${added.length - 30} 条</div>` : ''}
        </div>
      </div>` : ''}

      ${updated.length ? `
      <div style="margin-bottom:16px">
        <div style="font-weight:600;margin-bottom:8px;color:#b45309">🔄 更新记录 (${updated.length}条)</div>
        <div style="max-height:250px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:10px">
          ${updated.slice(0,15).map(u => `<div style="padding:10px;border-bottom:1px solid #f3f4f6;background:#fffbeb;border-radius:8px;margin-bottom:6px">
            <div style="font-weight:600;font-size:13px">${esc2(u.record.signedCustomer)} · ${esc2(u.record.customerName)} · ${esc2(u.record.plateNumber||u.record.vin||'-')}</div>
            <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">${u.changes.map(c=>`<span style="background:#fef3c7;padding:2px 7px;border-radius:5px;font-size:11px"><b>${esc2(c.field)}</b>: "${esc2(c.from)}"→"${esc2(c.to)}"</span>`).join('')}</div>
          </div>`).join('')}
          ${updated.length > 15 ? `<div style="text-align:center;padding:6px;color:var(--text-secondary);font-size:12px">... 还有 ${updated.length - 15} 条</div>` : ''}
        </div>
      </div>` : ''}

      ${!added.length && !updated.length ? '<div style="text-align:center;padding:40px;color:var(--text-secondary)">所有数据均已存在且无变化，无需导入</div>' : ''}
    </div>
    <div class="modal-footer">
      ${(added.length || updated.length) ? `<button class="btn btn-primary" id="kbImportConfirmBtn">确认导入（新增${added.length} + 更新${updated.length}）</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
    </div>`;
  // 存入全局变量，避免 inline JSON 引号截断问题
  window.__kbImportData = { added, updated };
  showModal(html);
  // 绑定确认按钮事件
  const btn = document.getElementById('kbImportConfirmBtn');
  if (btn) btn.onclick = function() {
    applyBaoWaiImport(window.__kbImportData.added, window.__kbImportData.updated);
  };
}

// 确认应用导入
function applyBaoWaiImport(addedRaw, updatedRaw) {
  try {
    const added = typeof addedRaw === 'string' ? JSON.parse(addedRaw) : addedRaw;
    const updated = typeof updatedRaw === 'string' ? JSON.parse(updatedRaw) : updatedRaw;

    if (!APP.baoWaiOrders) APP.baoWaiOrders = [];

    // 新增记录
    const maxSeq = APP.baoWaiOrders.reduce((m,o)=>Math(m,o.seq||0),0);
    added.forEach((row,i) => {
      row.id = 'bw_' + Date.now() + '_' + i;
      row.seq = maxSeq + i + 1;
      row.createDate = todayStr();
      APP.baoWaiOrders.push(row);
    });

    // 更新记录（增量合并）
    const existMap = new Map();
    APP.baoWaiOrders.forEach((o, i) => { existMap.set(bwMatchKey(o), i); });
    updated.forEach(u => {
      const ei = existMap.get(u.key);
      if (ei === undefined) return;
      u.changes.forEach(c => {
        APP.baoWaiOrders[ei][c.field] = c.to;
      });
    });

    saveData(APP);
    renderPage();
    closeModal();
    alert(`✅ 导入完成！新增 ${added.length} 条 · 更新 ${updated.length} 条 · 当前共 ${APP.baoWaiOrders.length} 条保外工单`);
  } catch(err) {
    console.error('applyBaoWaiImport error:', err);
    alert('应用导入时出错: ' + err.message);
  }
}

function importJSON(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(confirm('导入将覆盖当前所有数据，确认继续？')) {
        APP = { ...getDefaultData(), ...data };
        saveData(APP);
        renderPage();
        alert('导入成功！');
      }

      alert('文件格式错误，请选择有效的JSON文件');
    }
  };

}
