<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售管理系统 - 宁家服务数字化运营系统</title>
<style>
:root {
  --primary: #2563eb;
  --primary-light: #3b82f6;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-secondary: #64748b;
  --sidebar-w: 220px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Sidebar */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: #1e293b; color: #fff; z-index: 100; display: flex; flex-direction: column; }
.sidebar-brand { padding: 20px 16px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #334155; }
.sidebar-brand small { display: block; font-size: 11px; font-weight: 400; color: #94a3b8; margin-top: 4px; }
.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-section { padding: 8px 16px 4px; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
.nav-item { display: flex; align-items: center; padding: 10px 16px; cursor: pointer; color: #cbd5e1; font-size: 14px; transition: all .15s; border-left: 3px solid transparent; }
.nav-item:hover { background: #334155; color: #fff; }
.nav-item.active { background: #334155; color: #60a5fa; border-left-color: var(--primary); }
.nav-item .icon { width: 20px; margin-right: 10px; text-align: center; font-size: 15px; }
.nav-badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 10px; }

/* Main */
.main { margin-left: var(--sidebar-w); padding: 24px; min-height: 100vh; }

/* Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 22px; font-weight: 700; }
.page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Cards */
.card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.badge-blue { background: #dbeafe; color: var(--primary); }
.badge-green { background: #dcfce7; color: var(--success); }
.badge-yellow { background: #fef3c7; color: var(--warning); }
.badge-red { background: #fee2e2; color: var(--danger); }
.badge-gray { background: #f1f5f9; color: var(--text-secondary); }
.badge-purple { background: #ede9fe; color: #7c3aed; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 16px; text-align: center; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* Pipeline / Status Filter */
.pipeline { display: flex; align-items: center; gap: 0; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
.pipeline-step { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: all .15s; }
.pipeline-step:hover { border-color: var(--primary); }
.pipeline-step.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pipeline-arrow { color: #cbd5e1; font-size: 18px; margin: 0 4px; flex-shrink: 0; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8fafc; padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tbody tr:hover { background: #f8fafc; }
tbody tr { cursor: pointer; }

/* Status pills */
.status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-待返厂 { background: #fef3c7; color: #92400e; }
.status-返厂中 { background: #dbeafe; color: #1d4ed8; }
.status-维修中 { background: #fef3c7; color: #92400e; }
.status-物料采购中 { background: #ede9fe; color: #5b21b6; }
.status-待付款 { background: #fee2e2; color: #991b1b; }
.status-已付款 { background: #d1fae5; color: #065f46; }
.status-已完成 { background: #dcfce7; color: #166534; }
.status-已寄回 { background: #d1fae5; color: #065f46; }

/* Type tabs */
.type-tabs { display: flex; gap: 0; margin-bottom: 20px; background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.type-tab { padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; border-bottom: 2px solid transparent; }
.type-tab:hover { background: #f8fafc; }
.type-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #eff6ff; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #15803d; }
.btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: #fff; color: var(--danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-upload { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background .15s; }
.btn-upload:hover { background: #2563eb; }

/* Form */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; transition: border-color .15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.form-textarea { min-height: 60px; resize: vertical; }
.form-input[readonly] { background: #f8fafc; color: var(--text-secondary); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 12px 12px 0 0; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 4px; }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: #fff; border-radius: 0 0 12px 12px; }

/* Detail view */
.detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.detail-id { font-size: 18px; font-weight: 700; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 14px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px; color: var(--text-secondary); }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.detail-field-label { font-size: 11px; color: var(--text-secondary); }
.detail-field-value { font-size: 14px; font-weight: 500; margin-top: 2px; }

/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: var(--border); }
.timeline-item { position: relative; padding-bottom: 16px; }
.timeline-item::before { content: ''; position: absolute; left: -20px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.timeline-item.done::before { background: var(--success); }
.timeline-item.current::before { background: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,.2); }
.timeline-time { font-size: 11px; color: var(--text-secondary); }
.timeline-content { font-size: 13px; margin-top: 2px; }

/* Filter bar */
.filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.filter-bar .form-input, .filter-bar .form-select { padding: 7px 10px; font-size: 13px; }
.search-input { min-width: 200px; }

/* Upload status */
.upload-status-bar { padding: 10px 24px; background: #fff; border-bottom: 1px solid var(--border); font-size: 13px; display: none; align-items: center; gap: 8px; border-radius: 0 0 10px 10px; margin-bottom: 12px; }
.upload-status-bar.show { display: flex; }
.upload-status-bar.success { color: var(--success); background: #f0fdf4; border-color: #bbf7d0; }
.upload-status-bar.error { color: var(--danger); background: #fef2f2; border-color: #fecaca; }
.upload-status-bar.info { color: var(--primary); background: #eff6ff; border-color: #bfdbfe; }

/* Year tabs */
.year-tabs { display: flex; gap: 0; margin-bottom: 16px; background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; width: fit-content; }
.year-tab { padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border-bottom: 2px solid transparent; }
.year-tab:hover { background: #f8fafc; }
.year-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #eff6ff; }

/* CRM Card view */
.crm-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.crm-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 16px; cursor: pointer; transition: all .15s; }
.crm-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(37,99,235,.1); transform: translateY(-2px); }
.crm-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.crm-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
.crm-card-name { font-size: 15px; font-weight: 600; }
.crm-card-type { font-size: 11px; color: var(--text-secondary); }
.crm-card-info { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--text-secondary); }
.crm-card-info span { display: flex; align-items: center; gap: 6px; }
.crm-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.crm-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.tag-vip { background: #fef3c7; color: #92400e; }
.tag-key { background: #dbeafe; color: #1d4ed8; }
.tag-new { background: #dcfce7; color: #166534; }

/* Customer detail panel */
.customer-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.follow-record { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.follow-record:last-child { border-bottom: none; }
.follow-date { font-size: 11px; color: var(--text-secondary); min-width: 80px; }
.follow-content { font-size: 13px; flex: 1; }

/* View toggle */
.view-toggle { display: flex; gap: 4px; background: #f1f5f9; border-radius: 6px; padding: 2px; }
.view-toggle-btn { padding: 6px 12px; font-size: 12px; border: none; background: transparent; cursor: pointer; border-radius: 4px; transition: all .15s; }
.view-toggle-btn.active { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); font-weight: 500; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 180px; font-size: 12px; }
  .sidebar-brand { font-size: 13px; padding: 8px; }
  .sidebar-brand small { font-size: 9px; }
  .nav-item { padding: 6px 8px; font-size: 11px; }
  .nav-item .icon { font-size: 13px; }
  .nav-section { font-size: 9px; padding: 5px 8px 2px; }
  .nav-badge { font-size: 9px; padding: 1px 4px; }
  .main { margin-left: 180px; padding: 12px; }
  .form-grid { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: flex-start; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .customer-detail { grid-template-columns: 1fr; }
  .crm-cards { grid-template-columns: 1fr; }
}

/* Print */
@media print {
  .sidebar, .btn, .filter-bar, .pipeline, .type-tabs, .year-tabs { display: none !important; }
  .main { margin-left: 0; }
}
</style>

function getDefaultData() {
  return {
    repairOrders: [],
    customers: [],
    idCounters: { rp: 0, cr: 0 }
  };
}

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.repairOrders && d.repairOrders.length > 0) return { ...getDefaultData(), ...d };
  } catch(e) {}
  // Load default data if localStorage is empty
  if (typeof DEFAULT_SALES_DATA !== 'undefined') {
    return { ...getDefaultData(), ...DEFAULT_SALES_DATA };
  }
  return getDefaultData();
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let APP = loadData();

function genId(prefix) {
  APP.idCounters[prefix]++;
  saveData(APP);
  const n = String(APP.idCounters[prefix]).padStart(6, '0');
  return prefix === 'rp' ? `RP-${n}` : `CR-${n}`;
}

let currentPage = 'dashboard';

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage();
}

function renderPage() {
  const main = document.getElementById('mainContent');
  const statusBar = '<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelUpload(this)"><div class="upload-status-bar" id="uploadStatusBar"></div>';
  switch(currentPage) {
    case 'dashboard': main.innerHTML = statusBar + renderDashboard(); break;
    case 'repair': main.innerHTML = statusBar + renderRepairList(); break;
    case 'crm': main.innerHTML = statusBar + renderCRM(); break;
    case 'export': main.innerHTML = statusBar + renderExport(); break;
  }
  updateNavBadges();
}

    ${statuses.map((s,i) => `
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:80px;font-size:12px;color:var(--text-secondary);text-align:right">${s}</span>
        <div style="flex:1;height:22px;background:#f1f5f9;border-radius:4px;overflow:hidden">

}

function getFilteredRepairs() {
  let filtered = APP.repairOrders;
  
  // Year filter
  if (rpFilterYear !== '全部') {
    const yearPrefix = rpFilterYear === '25年度' ? '2025' : '2026';
    filtered = filtered.filter(o => {
      const dateStr = o.returnFactoryDate || o.createDate || '';
      return dateStr.startsWith(yearPrefix);
    });
  }
  
  // Type filter
  if (rpFilterType) filtered = filtered.filter(o => o.businessType === rpFilterType);
  
  // Status filter
  if (rpFilterStatus) filtered = filtered.filter(o => o.status === rpFilterStatus);
  
  // Search
  if (rpSearchText) {
    const t = rpSearchText.toLowerCase();
    filtered = filtered.filter(o => (
      (o.workOrderNo||'') + (o.customer||'') + (o.plateNumber||'') + 
      (o.contactPerson||'') + (o.vin||'') + (o.barcode||'')
    ).toLowerCase().includes(t));
  }
  
  return filtered;
}

function saveRepair(editId) {
  const data = {
    repairAddress: document.getElementById('f_rp_repairAddress').value,
    workOrderNo: document.getElementById('f_rp_workOrderNo').value,
    fieldOrder: document.getElementById('f_rp_fieldOrder').value,
    reportStatus: document.getElementById('f_rp_reportStatus').value,
    businessType: document.getElementById('f_rp_businessType').value,
    customer: document.getElementById('f_rp_customer').value,
    contactPerson: document.getElementById('f_rp_contactPerson').value,
    plateNumber: document.getElementById('f_rp_plateNumber').value,
    vin: document.getElementById('f_rp_vin').value,
    barcode: document.getElementById('f_rp_barcode').value,
    pn: document.getElementById('f_rp_pn').value,
    returnFactoryDate: document.getElementById('f_rp_returnFactoryDate').value,
    repairCompleteDate: document.getElementById('f_rp_repairCompleteDate').value,
    returnDate: document.getElementById('f_rp_returnDate').value,
    materialPurchaseDate: document.getElementById('f_rp_materialPurchaseDate').value,
    materialArrivalDate: document.getElementById('f_rp_materialArrivalDate').value,
    repairPerson: document.getElementById('f_rp_repairPerson').value,
    status: document.getElementById('f_rp_status').value,
    progress: document.getElementById('f_rp_progress').value,
    progress2: document.getElementById('f_rp_progress2').value,
  };

  if(!data.workOrderNo || !data.customer) {
    alert('请填写必填项：工单号、客户');
    return;
  }

  if(editId) {
    const idx = APP.repairOrders.findIndex(o => o.id === editId);
    if(idx >= 0) Object.assign(APP.repairOrders[idx], data);
  } else {
    data.id = genId('rp');
    data.createDate = todayStr();
    APP.repairOrders.push(data);
    
    // Auto-create customer if not exists
    autoCreateCustomer(data.customer, data.contactPerson);
  }
  saveData(APP);
  closeModal();
  renderPage();
}

function buildTimeline(o) {
  const steps = [
    { label: '返厂', date: o.returnFactoryDate },
    { label: '物料采购', date: o.materialPurchaseDate },
    { label: '物料到货', date: o.materialArrivalDate },
    { label: '维修完成', date: o.repairCompleteDate },
    { label: '返回客户', date: o.returnDate },
  ];
  
  return '<div class="timeline">' + steps.map((s, i) => {
    const done = !!s.date;
    const isCurrent = done && (i === steps.length-1 || !steps[i+1].date);
    return `<div class="timeline-item ${done?'done':''} ${isCurrent?'current':''}">
      <div class="timeline-time">${s.date||'待完成'}</div>
      <div class="timeline-content">${s.label}</div>
    </div>`;
  }).join('') + '</div>';
}

function getFilteredCustomers() {
  let filtered = APP.customers;
  if (crmSearchText) {
    const t = crmSearchText.toLowerCase();
    filtered = filtered.filter(c => (
      (c.name||'') + '|' + (c.contact||'') + '|' + (c.phone||'') + '|' + (c.mobile||'') + '|' + (c.address||'') + '|' + (c.vehicleBrand||'') + '|' + (c.batteryModel||'') + '|' + (c.customerType||'')
    ).toLowerCase().includes(t));
  }
  if (crmFilterTag) filtered = filtered.filter(c => (c.tags||[]).includes(crmFilterTag));
  if (crmFilterType) filtered = filtered.filter(c => c.region === crmFilterType);
  if (crmFilterBrand) filtered = filtered.filter(c => (c.vehicleBrand||'').includes(crmFilterBrand));
  if (crmFilterCustomerType) filtered = filtered.filter(c => c.customerType === crmFilterCustomerType);
  return filtered;
}

function getUniqueRegions() {
  const regions = new Set(APP.customers.map(c => c.region).filter(Boolean));
  return [...regions].sort();
}

function getUniqueBrands() {
  const brands = new Set();
  APP.customers.forEach(c => {
    if (c.vehicleBrand) {
      c.vehicleBrand.split(/[,，/、\s]+/).forEach(b => {
        const bb = b.trim();
        if (bb) brands.add(bb);
      });
    }
  });
  return [...brands].sort();
}

  if(document.getElementById('f_cr_tag_key')?.checked) tags.push('重点客户');
  if(document.getElementById('f_cr_tag_vip')?.checked) tags.push('VIP');
  
  const data = {

    contact: document.getElementById('f_cr_contact').value,

    email: document.getElementById('f_cr_email')?.value || '',

    batteryModel: document.getElementById('f_cr_batteryModel')?.value || '',
    warrantyStatus: document.getElementById('f_cr_warrantyStatus')?.value || '保内',
    tags: tags,
    remark: document.getElementById('f_cr_remark').value,
  };

  if(!data.name) {
    alert('请填写客户名称');

  if(editId) {

  saveData(APP);

  renderPage();

// Auto-create customer from repair order
function autoCreateCustomer(customerName, contactPerson, repairData) {
  if(!customerName) return;
  const exists = APP.customers.find(c => c.name === customerName);
  if(!exists) {
    // Extract vehicle brand from customer name (e.g., "汇邦新能-理想R2" -> "理想")
    let vehicleBrand = '';
    if (customerName.includes('-')) {
      vehicleBrand = customerName.split('-')[1] || '';
      // Remove model suffix like R1, R2
      vehicleBrand = vehicleBrand.replace(/R\d+$/, '').trim();
    }
    // Extract battery model from PN field
    let batteryModel = '';
    if (repairData && repairData.pn) {
      batteryModel = repairData.pn.split('-')[0] || '';
    }
    // Determine warranty status
    let warrantyStatus = (repairData && repairData.businessType) || '保内';
    
    APP.customers.push({
      id: genId('cr'),
      name: customerName,
      contact: contactPerson || '',
      phone: '',
      email: '',
      address: '',
      region: '',
      customerType: '中小客户',
      vehicleBrand: vehicleBrand,
      batteryModel: batteryModel,
      warrantyStatus: warrantyStatus,
      tags: ['新客'],
      followUps: [],
      createDate: todayStr(),
      remark: '从CTP返修数据自动创建'
    });
  }
}

// ===== EXCEL IMPORT =====
const RP_COLUMN_MAP = {
  '返修地址':'repairAddress','工单号':'workOrderNo','现场工单':'fieldOrder',
  '报单状态':'reportStatus','车牌':'plateNumber','车架号':'vin',
  'BARCODE':'barcode','PN':'pn','对接人':'contactPerson','客户':'customer',
  '返厂时间':'returnFactoryDate','维修完成时间':'repairCompleteDate',
  '返回时间':'returnDate','物料采购时间':'materialPurchaseDate',
  '物料到货时间':'materialArrivalDate','维修人':'repairPerson',
  '进度1':'progress','进度2':'progress2'
};

const RP_DEFAULTS = {
  repairAddress:'宁家服务',workOrderNo:'',fieldOrder:'',reportStatus:'',
  businessType:'保内',customer:'',contactPerson:'',plateNumber:'',vin:'',
  barcode:'',pn:'',returnFactoryDate:'',repairCompleteDate:'',returnDate:'',
  materialPurchaseDate:'',materialArrivalDate:'',repairPerson:'',
  status:'待返厂',progress:'',progress2:'',createDate:''
};

function showUploadStatus(msg, type) {
  const el = document.getElementById('uploadStatusBar');
  if (!el) return;
  el.className = 'upload-status-bar show ' + type;
  el.innerHTML = msg;
  if (type === 'success') setTimeout(() => { el.className = 'upload-status-bar show info'; }, 8000);
}

function detectRepairSheet(headers) {
  const repairKeys = ['工单号','返修地址','客户','返厂时间','维修人'];
  let score = 0;
  headers.forEach(h => { if (repairKeys.includes(h.trim())) score++; });
  return score >= 2;
}

function mapRepairRow(rawRow) {
  const obj = {...RP_DEFAULTS};
  for (const [cnHeader, jsKey] of Object.entries(RP_COLUMN_MAP)) {
    if (rawRow[cnHeader] !== undefined && rawRow[cnHeader] !== null) {
      let val = rawRow[cnHeader];
      if (val instanceof Date) {
        const y = val.getFullYear();
        const m = String(val.getMonth()+1).padStart(2,'0');
        const d = String(val.getDate()).padStart(2,'0');
        val = `${y}-${m}-${d}`;
      } else {
        val = String(val).trim();
      }
      obj[jsKey] = val;
    }
  }
  return obj;
}

function handleExcelUpload(input) {
  const file = input.files[0];
  if (!file) return;

  showUploadStatus('⏳ 正在读取 <b>' + file.name + '</b> ...', 'info');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array', cellDates:true});

      let totalImported = 0;

      for (const sheetName of workbook.SheetNames) {
        const sheet = workbook.Sheets[sheetName];
        let jsonData = XLSX.utils.sheet_to_json(sheet, {defval:''});
        if (!jsonData.length) continue;

        // Check if headers are in first row
        let headers = Object.keys(jsonData[0]);
        
        // If headers don't match repair keys, check if row 2 has headers
        // (some sheets have title in row 1, headers in row 2)
        if (!detectRepairSheet(headers)) {
          // Try to find header row by looking for repair keys in subsequent rows
          let headerRowIndex = -1;
          for (let i = 0; i < Math.min(5, jsonData.length); i++) {
            const rowKeys = Object.keys(jsonData[i]);
            if (detectRepairSheet(rowKeys)) {
              headerRowIndex = i;
              break;
            }
          }
          // If not found in json data, check raw sheet cells
          if (headerRowIndex === -1) {
            const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
            for (let r = range.s.r; r <= Math.min(range.s.r + 5, range.e.r); r++) {
              const rowHeaders = [];
              for (let c = range.s.c; c <= range.e.c; c++) {
                const cell = sheet[XLSX.utils.encode_cell({r, c})];
                if (cell && cell.v) rowHeaders.push(String(cell.v).trim());
              }
              if (detectRepairSheet(rowHeaders)) {
                // Re-parse with this row as header
                jsonData = XLSX.utils.sheet_to_json(sheet, {defval:'', header: 1, raw: false});
                const headerRow = jsonData[r];
                const dataRows = jsonData.slice(r + 1);
                jsonData = dataRows.map(row => {
                  const obj = {};
                  headerRow.forEach((h, idx) => {
                    if (h && row[idx] !== undefined) obj[h] = row[idx];
                  });
                  return obj;
                });
                headers = headerRow.map(h => String(h).trim());
                break;
              }
            }
          }
        }
        
        if (!detectRepairSheet(headers)) continue;
          jsonData.forEach(row => {
            const mapped = mapRepairRow(row);
            if (!mapped.workOrderNo) return;
            
            // Auto-detect business type
            if (!mapped.businessType || mapped.businessType === '保内') {
              const progressStr = (mapped.progress || '').toLowerCase();
              if (progressStr.includes('保外') || progressStr.includes('付费')) {
                mapped.businessType = '保外';
              }
            }
            
            // Auto-detect status from dates and progress
            if (!mapped.status || mapped.status === '待返厂') {
              if (mapped.returnDate) mapped.status = '已寄回';
              else if (mapped.repairCompleteDate) mapped.status = '已完成';
              else if (mapped.materialArrivalDate) mapped.status = '维修中';
              else if (mapped.materialPurchaseDate) mapped.status = '物料采购中';
              else if (mapped.returnFactoryDate) mapped.status = '返厂中';
            }
            
            mapped.id = genId('rp');
            mapped.createDate = todayStr();
            APP.repairOrders.push(mapped);
            totalImported++;
            
            // Auto-create customer with repair data
            autoCreateCustomer(mapped.customer, mapped.contactPerson, mapped);
          });
      }

      saveData(APP);
      
      if (totalImported > 0) {
        showUploadStatus('✅ 成功导入 <b>' + totalImported + '</b> 条返修记录', 'success');
      } else {
        showUploadStatus('⚠️ 未检测到返修数据，请确认Excel表头包含：工单号、客户、返厂时间等字段', 'error');
      }
      
      renderPage();
      input.value = '';
    } catch(err) {
      showUploadStatus('❌ 文件解析失败：' + err.message, 'error');
      input.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">导出/导入完整系统数据（JSON格式）</p>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" onclick="exportJSON()">导出JSON</button>
          <label class="btn btn-outline" style="cursor:pointer">导入JSON<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
        </div>
      </div>
    </div>
  `;
}

function exportRepairCSV() {
  const headers = ['工单号','业务类型','客户','对接人','车牌','车架号','BARCODE','PN','返修地址','报单状态','返厂时间','维修完成时间','返回时间','物料采购时间','物料到货时间','维修人','状态','进度1','进度2'];
  const rows = APP.repairOrders.map(o => [o.workOrderNo,o.businessType,o.customer,o.contactPerson,o.plateNumber,o.vin,o.barcode,o.pn,o.repairAddress,o.reportStatus,o.returnFactoryDate,o.repairCompleteDate,o.returnDate,o.materialPurchaseDate,o.materialArrivalDate,o.repairPerson,o.status,o.progress,o.progress2]);
  const bom = '\uFEFF';
  const csv = bom + [headers.join(','), ...rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `返修数据_${todayStr()}.csv`;
  a.click();
}

function exportCustomerCSV() {
  const headers = ['客户名称','联系人','电话','地址','区域','客户类型','标签','备注','创建时间'];
  const rows = APP.customers.map(c => [c.name,c.contact,c.phone,c.address,c.region,c.customerType,(c.tags||[]).join('/'),c.remark,c.createDate]);
  const bom = '\uFEFF';
  const csv = bom + [headers.join(','), ...rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `客户数据_${todayStr()}.csv`;
  a.click();
}

function exportJSON() {
  const json = JSON.stringify(APP, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sales_data_${todayStr()}.json`;
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(confirm('导入将覆盖当前所有数据，确认继续？')) {
        APP = { ...getDefaultData(), ...data };
        saveData(APP);
        renderPage();
        alert('导入成功！');
      }
    } catch(err) {
      alert('文件格式错误，请选择有效的JSON文件');
    }
  };
  reader.readAsText(file);
}

// ===== UTILS =====
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  renderPage();
});
</script>
