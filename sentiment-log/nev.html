<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新能源电车市占率 · 各省市月度监测 - 舆情监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="nev-embed.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --bg:#0f1626; --bg2:#131d33; --card:rgba(255,255,255,.04); --card2:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.10); --txt:#eaf0fb; --txt2:rgba(234,240,251,.66); --muted:rgba(234,240,251,.4);
    --accent:#39d98a; --accent2:#4facfe; --grad:linear-gradient(135deg,#4facfe 0%,#39d98a 100%);
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(79,172,254,.12),transparent),var(--bg);
    color:var(--txt); min-height:100vh; padding:26px 18px 70px;
  }
  .container{max-width:1100px;margin:0 auto;}
  .back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--txt2);text-decoration:none;margin-bottom:14px;}
  .back:hover{color:var(--accent2);}
  .head{display:flex;align-items:center;gap:16px;margin-bottom:6px;}
  .head .ic{width:52px;height:52px;border-radius:14px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 6px 22px rgba(57,217,138,.32);flex-shrink:0;}
  .head h1{font-size:22px;font-weight:750;letter-spacing:.3px;}
  .head .sub{font-size:12.5px;color:var(--txt2);margin-top:3px;}
  .head .sub b{color:var(--accent);}

  .ctl{display:flex;align-items:center;gap:14px;margin:16px 0 18px;flex-wrap:wrap;
    background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;}
  .month-label{font-size:20px;font-weight:750;min-width:118px;font-variant-numeric:tabular-nums;}
  .slider-wrap{flex:1;min-width:240px;display:flex;align-items:center;gap:12px;}
  input[type=range]{flex:1;accent-color:var(--accent);height:4px;cursor:pointer;}
  .slider-wrap .end{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .pill{font-size:12px;color:var(--txt2);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;}
  .pill b{color:var(--accent);}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;}
  .kpi::before{content:"";position:absolute;left:0;top:0;width:3px;height:100%;background:var(--grad);opacity:.8;}
  .kpi .v{font-size:24px;font-weight:780;font-variant-numeric:tabular-nums;line-height:1.1;}
  .kpi .v small{font-size:13px;font-weight:600;color:var(--txt2);margin-left:2px;}
  .kpi .l{font-size:12px;color:var(--txt2);margin-top:5px;}
  .kpi .d{font-size:11.5px;margin-top:4px;font-variant-numeric:tabular-nums;}
  .up{color:var(--accent);} .down{color:#ff7b72;}

  .grid{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;margin-bottom:16px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 16px 8px;}
  .panel h3{font-size:14.5px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px;}
  .panel h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .panel .hint{font-size:11.5px;color:var(--muted);margin-bottom:8px;}
  #map{width:100%;height:440px;}
  #bar{width:100%;height:440px;}

  .tbl-wrap{overflow-x:auto;margin-top:6px;}
  table.heat{border-collapse:separate;border-spacing:0;width:100%;font-size:12px;font-variant-numeric:tabular-nums;}
  table.heat th,table.heat td{padding:6px 7px;text-align:center;white-space:nowrap;}
  table.heat thead th{position:sticky;top:0;color:var(--txt2);font-weight:600;background:var(--bg2);z-index:2;}
  table.heat tbody th{text-align:left;position:sticky;left:0;background:var(--bg2);color:var(--txt);font-weight:600;z-index:1;min-width:78px;}
  table.heat td{border-radius:4px;color:#06231a;font-weight:600;cursor:pointer;}
  table.heat td:hover{outline:2px solid rgba(255,255,255,.5);outline-offset:-2px;}
  table.heat td.sel{outline:2px solid #fff;outline-offset:-2px;}
  table.heat thead th.sel{color:#fff;background:var(--accent2);}
  .legend{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin:10px 2px 4px;}
  .legend .bar{height:10px;width:160px;border-radius:6px;background:linear-gradient(90deg,#e8f6ee,#9fe9c4,#39d98a,#1f9d63,#0c5b39);}

  .note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.6;text-align:center;}
  .err{padding:50px 20px;text-align:center;color:var(--txt2);}
  @media(max-width:880px){
    .kpis{grid-template-columns:repeat(2,1fr);}
    .grid{grid-template-columns:1fr;}
    .head h1{font-size:20px;}
  }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← 返回舆情监控日志</a>

  <div class="head">
    <div class="ic">🔋</div>
    <div>
      <h1>新能源电车市占率 · 各省市月度监测</h1>
      <div class="sub">省级行政区新能源乘用车零售渗透率 · 舆情监控子模块 · 数据口径：<b id="srcNote">示例数据</b></div>
    </div>
  </div>

  <div class="ctl" id="ctl" style="display:none">
    <div class="month-label" id="monthLabel">—</div>
    <div class="slider-wrap">
      <span class="end" id="mStart">—</span>
      <input type="range" id="slider" min="0" max="0" value="0" step="1">
      <span class="end" id="mEnd">—</span>
    </div>
    <span class="pill">共 <b id="mCount">0</b> 个月 · <b id="pCount">0</b> 个地区</span>
  </div>

  <div id="errBox"></div>

  <div id="app" style="display:none">
    <div class="kpis" id="kpis"></div>

    <div class="grid">
      <div class="panel">
        <h3><span class="dot"></span>省份地图分布</h3>
        <div class="hint">颜色越深，当月新能源市占率越高</div>
        <div id="map"></div>
      </div>
      <div class="panel">
        <h3><span class="dot"></span>市占率 Top 10</h3>
        <div class="hint">当月排名前十的省级行政区</div>
        <div id="bar"></div>
      </div>
    </div>

    <div class="panel">
      <h3><span class="dot"></span>省份 × 月份 热力表</h3>
      <div class="hint">行=地区，列=月份；点击任意单元格可切换至该月份。颜色越深市占率越高。</div>
      <div class="tbl-wrap"><table class="heat" id="heat"></table></div>
      <div class="legend"><span>低</span><span class="bar"></span><span>高</span><span style="margin-left:8px">单位：%</span></div>
    </div>

    <div class="note" id="footNote"></div>
  </div>
</div>

<script>
const EMBED = window.NEV_EMBEDDED;
let MODEL = null;
let MONTHS = [], PROV = [], UNIT = '%';
let cur = 0;
let mapChart, barChart;
let mapReady = false;

function shortName(n){ return n.replace(/省$/,'').replace(/市$/,'').replace(/自治区$/,'').replace(/回族|壮族|维吾尔/,''); }
function fmt(v){ return (v==null)?'—':(Number(v).toFixed(1)); }

async function init(){
  try{
    const r = await fetch('nev-share.json?t='+Date.now());
    if(r.ok) MODEL = await r.json();
  }catch(e){}
  if(!MODEL && EMBED) MODEL = EMBED;
  if(!MODEL){ document.getElementById('errBox').innerHTML='<div class="err">⚠️ 数据加载失败，请确认 nev-share.json 存在。</div>'; return; }

  MONTHS = MODEL.months || [];
  PROV = (MODEL.data || []).map(d=>({name:d.name, region:d.region, values:d.values}));
  UNIT = MODEL.unit || '%';
  document.getElementById('srcNote').textContent = (MODEL.source||'示例数据');
  document.getElementById('footNote').textContent = '数据说明：'+ (MODEL.source||'示例数据') + '。本页为纯前端可视化，数据来自 nev-share.json，可随时替换更新。';

  cur = MONTHS.length - 1;

  const slider = document.getElementById('slider');
  slider.max = MONTHS.length - 1; slider.value = cur;
  document.getElementById('mStart').textContent = MONTHS[0];
  document.getElementById('mEnd').textContent = MONTHS[MONTHS.length-1];
  document.getElementById('mCount').textContent = MONTHS.length;
  document.getElementById('pCount').textContent = PROV.length;
  document.getElementById('ctl').style.display='flex';
  document.getElementById('app').style.display='block';

  slider.addEventListener('input', e=>{ setMonth(+e.target.value); });

  mapChart = echarts.init(document.getElementById('map'),'dark');
  barChart = echarts.init(document.getElementById('bar'),'dark');
  window.addEventListener('resize', ()=>{ mapChart.resize(); barChart.resize(); });

  loadMap();
  renderKPI(); renderBar(); renderHeat();
  document.getElementById('monthLabel').textContent = MONTHS[cur];
}

function setMonth(m){
  cur = Math.max(0, Math.min(MONTHS.length-1, m));
  document.getElementById('slider').value = cur;
  document.getElementById('monthLabel').textContent = MONTHS[cur];
  renderKPI(); renderMap(); renderBar(); renderHeat();
}

// ---------- KPI ----------
function renderKPI(){
  const vals = PROV.map(p=>p.values[cur]);
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  let maxI=0, minI=0;
  PROV.forEach((p,i)=>{ if(p.values[cur]>PROV[maxI].values[cur]) maxI=i; if(p.values[cur]<PROV[minI].values[cur]) minI=i; });
  let deltaTxt='', deltaCls='';
  if(cur>0){
    const prevAvg = PROV.map(p=>p.values[cur-1]).reduce((a,b)=>a+b,0)/PROV.length;
    const d = avg - prevAvg;
    deltaCls = d>=0?'up':'down';
    deltaTxt = (d>=0?'▲ ':'▼ ')+Math.abs(d).toFixed(1)+' pp 环比';
  }
  const over50 = PROV.filter(p=>p.values[cur]>50).length;
  const cards = [
    { v:fmt(avg), unit:'%', l:'全国均值（'+MONTHS[cur]+'）', d:deltaTxt, dc:deltaCls },
    { v:PROV[maxI].name.replace(/省|市|自治区|回族|壮族|维吾尔/g,''), unit:'', l:'市占率最高', d:fmt(PROV[maxI].values[cur])+'%', dc:'' },
    { v:PROV[minI].name.replace(/省|市|自治区|回族|壮族|维吾尔/g,''), unit:'', l:'市占率最低', d:fmt(PROV[minI].values[cur])+'%', dc:'' },
    { v:over50, unit:'', l:'超 50% 地区数', d:'/ 共 '+PROV.length+' 个', dc:'' }
  ];
  document.getElementById('kpis').innerHTML = cards.map(c=>`
    <div class="kpi">
      <div class="v">${c.v}<small>${c.unit}</small></div>
      <div class="l">${c.l}</div>
      <div class="d ${c.dc}">${c.d}</div>
    </div>`).join('');
}

// ---------- 地图 ----------
function loadMap(){
  fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
    .then(r=>{ if(!r.ok) throw new Error('geojson '+r.status); return r.json(); })
    .then(geo=>{
      echarts.registerMap('china', geo);
      mapReady = true;
      renderMap();
    })
    .catch(err=>{
      document.getElementById('map').innerHTML = '<div class="err" style="padding:40px 10px">⚠️ 地图底图加载失败（需联网获取地理边界），其余图表不受影响。<br>'+err.message+'</div>';
    });
}
function renderMap(){
  if(!mapReady) return;
  const data = PROV.map(p=>({ name:p.name, value:p.values[cur] }));
  const maxV = Math.max(...data.map(d=>d.value));
  const minV = Math.min(...data.map(d=>d.value));
  mapChart.setOption({
    backgroundColor:'transparent',
    tooltip:{ trigger:'item', formatter:p=> p.value!=null ? `${p.name}<br/>市占率：<b>${p.value.toFixed(1)}%</b>` : p.name },
    visualMap:{ min:Math.max(0,minV-3), max:maxV+1, left:14, bottom:14,
      text:['高','低'], calculable:true, itemHeight:120,
      inRange:{ color:['#e8f6ee','#9fe9c4','#39d98a','#1f9d63','#0c5b39'] }, textStyle:{color:'#cfe'} },
    series:[{
      type:'map', map:'china', roam:false, label:{ show:false },
      emphasis:{ label:{show:false}, itemStyle:{ areaColor:'#ffd166' } },
      itemStyle:{ borderColor:'rgba(255,255,255,.25)', borderWidth:.6, areaColor:'#1d2942' },
      data
    }]
  });
}

// ---------- Top 10 条形 ----------
function renderBar(){
  const ranked = PROV.map(p=>({name:p.name, v:p.values[cur]})).sort((a,b)=>b.v-a.v).slice(0,10);
  barChart.setOption({
    backgroundColor:'transparent',
    grid:{left:8,right:48,top:10,bottom:6,containLabel:true},
    tooltip:{ trigger:'axis', axisPointer:{type:'shadow'}, formatter:p=>`${p[0].name}<br/>市占率：<b>${p[0].value.toFixed(1)}%</b>` },
    xAxis:{ type:'value', axisLabel:{formatter:'{value}%', color:'#9fb'}, splitLine:{lineStyle:{color:'rgba(255,255,255,.07)'}} },
    yAxis:{ type:'category', inverse:true, data:ranked.map(d=>shortName(d.name)),
      axisLabel:{color:'#dfe'}, axisTick:{show:false}, axisLine:{lineStyle:{color:'rgba(255,255,255,.15)'}} },
    series:[{
      type:'bar', data:ranked.map(d=>+d.v.toFixed(1)), barWidth:'58%',
      itemStyle:{ borderRadius:[0,6,6,0], color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#4facfe'},{offset:1,color:'#39d98a'}]) },
      label:{ show:true, position:'right', formatter:'{c}%', color:'#dfe', fontSize:11 }
    }]
  });
}

// ---------- 热力表 ----------
function heatColor(v, minV, maxV){
  const t = (v-minV)/(maxV-minV || 1);
  const stops = [[232,246,238],[159,233,196],[57,217,138],[31,157,99],[12,91,57]];
  const seg = t*(stops.length-1);
  const i = Math.min(stops.length-2, Math.floor(seg));
  const f = seg-i;
  const c = stops[i].map((s,k)=> Math.round(s + (stops[i+1][k]-s)*f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function renderHeat(){
  const minV = Math.min(...PROV.map(p=>Math.min(...p.values)));
  const maxV = Math.max(...PROV.map(p=>Math.max(...p.values)));
  const tbl = document.getElementById('heat');
  let html = '<thead><tr><th></th>' + MONTHS.map((m,i)=>`<th class="${i===cur?'sel':''}">${m.slice(2)}</th>`).join('') + '</tr></thead><tbody>';
  PROV.forEach(p=>{
    html += `<tr><th>${shortName(p.name)}</th>` + p.values.map((v,i)=>{
      const bg = heatColor(v, minV, maxV);
      return `<td style="background:${bg};color:#06231a" data-m="${i}" title="${p.name} ${MONTHS[i]}: ${v.toFixed(1)}%">${v.toFixed(1)}</td>`;
    }).join('') + '</tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;
  tbl.querySelectorAll('td').forEach(td=> td.addEventListener('click', ()=> setMonth(+td.dataset.m) ));
}

init();
</script>
</body>
</html>
