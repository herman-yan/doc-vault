<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中央资料管理库</title>
    <style>
        /* ========== CSS变量定义 ========== */
        :root {
            --primary-dark: #1a2332;
            --primary-blue: #3b82f6;
            --primary-blue-light: #60a5fa;
            --bg-light: #f5f7fa;
            --bg-white: #ffffff;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --text-light: #9ca3af;
            --border-color: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            /* 分类颜色 */
            --cat-contract: #8b5cf6;
            --cat-certificate: #d97706;
            --cat-finance: #10b981;
            --cat-legal: #ef4444;
            --cat-hr: #ec4899;
            --cat-admin: #14b8a6;
            --cat-project: #6366f1;
            --cat-business: #0ea5e9;
            --cat-tech: #3b82f6;
            --cat-other: #6b7280;
            
            --sidebar-width: 260px;
            --header-height: 64px;
            --detail-panel-width: 380px;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
        }

        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ========== 整体布局 ========== */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* ========== 左侧边栏 ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary-dark);
            color: #fff;
            display: flex;
            flex-direction: column;
            transition: width var(--transition-normal);
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
        }

        .sidebar-logo .icon {
            font-size: 24px;
        }

        .sidebar.collapsed .sidebar-logo span,
        .sidebar.collapsed .category-name,
        .sidebar.collapsed .category-count {
            display: none;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: all var(--transition-fast);
            border-left: 3px solid transparent;
            gap: 12px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.2);
            border-left-color: var(--primary-blue);
        }

        .nav-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .nav-item .category-name {
            flex: 1;
            font-size: 14px;
        }

        .nav-item .category-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .collapse-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity var(--transition-fast);
        }

        .collapse-btn:hover {
            opacity: 1;
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== 顶部导航栏 ========== */
        .header {
            height: var(--header-height);
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 24px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all var(--transition-fast);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
        }

        .header-stats {
            display: flex;
            gap: 24px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-gray);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-blue-light);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dark);
        }

        .btn-outline:hover {
            background: var(--bg-light);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            background: #059669;
        }

        /* ========== 内容区域 ========== */
        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* ========== 上传区域 ========== */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: var(--bg-white);
            margin-bottom: 24px;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-zone.dragover {
            transform: scale(1.01);
        }

        .upload-zone .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-zone h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .upload-zone p {
            color: var(--text-gray);
            font-size: 14px;
        }

        #fileInput {
            display: none;
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .view-toggle {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .view-toggle button {
            padding: 8px 12px;
            background: var(--bg-white);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .view-toggle button.active {
            background: var(--primary-blue);
            color: #fff;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-white);
        }

        .results-count {
            color: var(--text-gray);
            font-size: 14px;
        }

        /* ========== 文件网格视图 ========== */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .file-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-blue);
        }

        .file-card.highlight {
            animation: highlight-pulse 0.6s ease;
        }

        @keyframes highlight-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }

        .file-card-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .file-card-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-card-meta {
            font-size: 12px;
            color: var(--text-gray);
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .file-card-category {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .file-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .tag {
            background: var(--bg-light);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-gray);
        }

        /* ========== 文件列表视图 ========== */
        .files-list {
            background: var(--bg-white);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .list-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 100px;
            padding: 12px 20px;
            background: var(--bg-light);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
        }

        .list-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 100px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background var(--transition-fast);
            align-items: center;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background: var(--bg-light);
        }

        .list-item-name {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .list-item-name span:first-child {
            font-size: 24px;
        }

        .list-item-name span:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .list-item-actions {
            display: flex;
            gap: 8px;
        }

        .list-item-actions button {
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-white);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .list-item-actions button:hover {
            background: var(--bg-light);
        }

        .list-item-actions button.delete:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        /* ========== 详情面板 ========== */
        .detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--detail-panel-width);
            height: 100vh;
            background: var(--bg-white);
            box-shadow: var(--shadow-lg);
            transform: translateX(100%);
            transition: transform var(--transition-normal);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .detail-panel.open {
            transform: translateX(0);
        }

        .detail-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .detail-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-gray);
            transition: color var(--transition-fast);
        }

        .detail-close:hover {
            color: var(--text-dark);
        }

        .detail-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .detail-icon {
            font-size: 72px;
            text-align: center;
            margin-bottom: 20px;
        }

        .detail-field {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 14px;
            word-break: break-all;
        }

        .detail-value.filename {
            font-weight: 600;
            font-size: 16px;
        }

        .detail-summary {
            background: var(--bg-light);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            max-height: 150px;
            overflow-y: auto;
        }

        .detail-category-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-white);
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detail-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-light);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .detail-tag button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-gray);
            padding: 0;
        }

        .detail-tag button:hover {
            color: var(--danger);
        }

        .add-tag-form {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .add-tag-form input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
        }

        .add-tag-form button {
            padding: 8px 12px;
            background: var(--primary-blue);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .detail-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .detail-footer button {
            flex: 1;
        }

        /* ========== 设置面板 ========== */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
            z-index: 200;
        }

        .settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-white);
            border-radius: 12px;
            padding: 24px;
            width: 460px;
            max-width: 90%;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
            z-index: 201;
            max-height: 90vh;
            overflow-y: auto;
        }

        .settings-panel.open {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .settings-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .settings-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-item h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .settings-item p {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 12px;
        }

        .settings-item .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ========== 确认弹窗 ========== */
        .confirm-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-white);
            border-radius: 12px;
            padding: 24px;
            width: 380px;
            max-width: 90%;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
            z-index: 300;
        }

        .confirm-modal.open {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .confirm-modal h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .confirm-modal p {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        .confirm-modal .btn-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* ========== 加载状态 ========== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Toast提示 ========== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }

        .toast {
            background: var(--primary-dark);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 12px;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.loading {
            background: var(--text-gray);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== 分类颜色类 ========== */
        .cat-contract { background: rgba(139, 92, 246, 0.1); color: var(--cat-contract); }
        .cat-certificate { background: rgba(217, 119, 6, 0.1); color: var(--cat-certificate); }
        .cat-finance { background: rgba(16, 185, 129, 0.1); color: var(--cat-finance); }
        .cat-legal { background: rgba(239, 68, 68, 0.1); color: var(--cat-legal); }
        .cat-hr { background: rgba(236, 72, 153, 0.1); color: var(--cat-hr); }
        .cat-admin { background: rgba(20, 184, 166, 0.1); color: var(--cat-admin); }
        .cat-project { background: rgba(99, 102, 241, 0.1); color: var(--cat-project); }
        .cat-business { background: rgba(14, 165, 233, 0.1); color: var(--cat-business); }
        .cat-tech { background: rgba(59, 130, 246, 0.1); color: var(--cat-tech); }
        .cat-other { background: rgba(107, 114, 128, 0.1); color: var(--cat-other); }

        /* ========== 滚动条美化 ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-gray);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 60px;
            }
            .sidebar .sidebar-logo span,
            .sidebar .category-name,
            .sidebar .category-count {
                display: none;
            }
            .header-stats {
                display: none;
            }
        }

        /* ========== 云端同步指示器 ========== */
        .cloud-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* ========== 初始化加载状态 ========== */
        .init-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a2332 0%, #2d3748 50%, #1a2332 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .init-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .init-overlay .init-icon {
            font-size: 64px;

<body>
    <!-- ========== 初始化加载界面 ========== -->
    <div class="init-overlay" id="initOverlay">
        <div class="init-icon">☁️</div>
        <h2>中央资料管理库</h2>

    <div class="app-container" id="appContainer">

        <!-- ========== 主内容区 ========== -->
        <main class="main-content">

            <header class="header">

                <div class="search-box">

                <div class="header-stats" id="headerStats">

            <!-- 内容区域 -->

                    <div class="uploader-input-wrap" id="uploaderInputWrap" style="margin-top:12px;display:flex;align-items:center;gap:8px;justify-content:center;">

                        <input type="text" id="uploaderNameInput" placeholder="请输入姓名" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:14px;width:160px;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--primary-blue)'" onblur="this.style.borderColor='var(--border-color)'">

                <!-- 工具栏 -->
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="view-toggle">
                            <button class="active" data-view="grid" title="网格视图">▦</button>

                        <select class="sort-select" id="sortSelect">

        <!-- ========== 详情面板 ========== -->

    <!-- ========== 设置面板 ========== -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>⚙️ 设置</h3>
            <button class="detail-close" id="settingsClose">×</button>
        </div>
        <div class="settings-content">
            <div class="settings-item">
                <h4>☁️ 从云端同步</h4>
                <p>重新从GitHub仓库加载最新数据</p>
                <button class="btn btn-primary" id="syncBtn">🔄 同步数据</button>

                <h4>📤 导出数据</h4>

            </div>

    <!-- ========== 确认弹窗 ========== -->

        <h3 id="confirmTitle">确认删除</h3>
