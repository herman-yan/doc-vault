        <div class="btn-group">
            <button class="btn btn-outline" id="confirmCancel">取消</button>
            <button class="btn btn-danger" id="confirmOk">确认</button>
        </div>
    </div>

    <!-- ========== Toast容器 ========== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        /* ============================================================
         * 中央资料管理库 - GitHub API 共享版
         * 所有数据存储在GitHub仓库中
         * ============================================================ */

        // ========== GitHub 数据管理器 (v3 - 分离存储) ==========
        // data.json 只存元数据（索引），文件内容单独存储
        const GitHubDataManager = {
            REPO: 'herman-yan/doc-vault',
            PATH: 'docs-vault/data.json',
            FILES_PATH: 'docs-vault/files/',
            TOKEN: String.fromCharCode(103,104,111,95,110,81,70,86,100,115,110,108,56,109,49,97,99,117,110,102,115,65,77,113,116,121,82,66,75,122,114,112,74,77,50,114,119,106,118,89),
            API_BASE: 'https://api.github.com',
            data: null,
            sha: null,

            // 从GitHub读取data.json（仅元数据，很小很快）
            async load() {
                try {
                    const url = `${this.API_BASE}/repos/${this.REPO}/contents/${this.PATH}`;
                    const metaResponse = await fetch(url, {
                        headers: {
                            'Authorization': `token ${this.TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (metaResponse.status === 404) {
                        this.data = { version: 3, storageMode: 'separate', documents: [], lastUpdated: new Date().toLocaleString('zh-CN') };
                        this.sha = null;
                        await this.save();
                        return true;
                    }

                    // token 鉴权失败（401/403）→ 自动改用公开 raw 读取，保证内容可见
                    if (metaResponse.status === 401 || metaResponse.status === 403) {
                        console.warn('Token 鉴权失败，改用公开 raw 读取');
                        const ok = await this._loadFromRaw();
                        if (ok) return true;
                        throw new Error(`HTTP ${metaResponse.status}`);
                    }

                    if (!metaResponse.ok) throw new Error(`HTTP ${metaResponse.status}`);

                    const meta = await metaResponse.json();
                    this.sha = meta.sha;

                    if (meta.encoding === 'base64' && meta.content) {
                        const b64 = meta.content.replace(/\n/g, '');
                        const content = decodeURIComponent(escape(atob(b64)));
                        this.data = JSON.parse(content);
                    } else {
                        const rawResponse = await fetch(url, {
                            headers: { 'Authorization': `token ${this.TOKEN}`, 'Accept': 'application/vnd.github.v3.raw' }
                        });
                        if (!rawResponse.ok) throw new Error(`Raw fetch failed: HTTP ${rawResponse.status}`);
                        this.data = JSON.parse(await rawResponse.text());
                    }
                    return true;
                } catch (error) {
                    // 网络等异常 → 尝试 raw 兜底，保证内容可读
                    console.error('GitHub API 加载失败，尝试 raw 兜底:', error);
                    try {
                        const ok = await this._loadFromRaw();
                        if (ok) return true;
                    } catch (e2) { console.error('raw 兜底失败:', e2); }
                    throw error;
                }
            },

            // 公开 raw 兜底读取（无需 token，仓库公开即可；只读，不能写回）
            async _loadFromRaw() {
                try {
                    const rawUrl = `https://raw.githubusercontent.com/${this.REPO}/main/${this.PATH}`;
                    const resp = await fetch(rawUrl, { headers: { 'Accept': 'application/json' } });
                    if (!resp.ok) throw new Error(`Raw HTTP ${resp.status}`);
                    this.data = JSON.parse(await resp.text());
                    this.sha = null; // 只读模式，无法写回
                    console.warn('已通过公开 raw 加载数据（只读，上传/编辑将不可用）');
                    return true;
                } catch (e) {
                    console.error('raw 兜底读取失败:', e);
                    return false;
                }
            },

            // 写入data.json到GitHub（仅元数据）
            async save() {
                try {
                    const content = JSON.stringify(this.data, null, 2);
                    const base64Content = btoa(unescape(encodeURIComponent(content)));
                    const url = `${this.API_BASE}/repos/${this.REPO}/contents/${this.PATH}`;
                    const body = { message: `update: 文档数据 ${new Date().toLocaleString('zh-CN')}`, content: base64Content };
                    if (this.sha) body.sha = this.sha;

                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${this.TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                    const result = await response.json();
                    this.sha = result.content.sha;
                    return true;
                } catch (error) {
                    console.error('保存数据失败:', error);
                    throw error;
                }
            },

            // 原子操作：重新加载最新数据后执行变更
            async _reloadAndApply(applyFn) {
                const maxRetries = 3;
                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        await this.load();
                        applyFn();
                        await this.save();
                        return true;
                    } catch (error) {
                        if (error.message && (error.message.includes('422') || error.message.includes('409'))) {
                            console.log(`SHA冲突，第 ${attempt+1} 次重试...`);
                            if (attempt === maxRetries - 1) throw new Error('保存失败：多次重试后仍有冲突，请刷新页面重试');
                            continue;
                        }
                        throw error;
                    }
                }
            },

            // 上传单个文件到GitHub独立存储
            async uploadFile(fileId, fileName, arrayBuffer) {
                const ext = fileName.includes('.') ? fileName.split('.').pop() : 'bin';
                const filePath = `${this.FILES_PATH}${fileId}.${ext}`;
                const uint8 = new Uint8Array(arrayBuffer);
                let binary = '';
                for (let i = 0; i < uint8.length; i++) binary += String.fromCharCode(uint8[i]);
                const b64 = btoa(binary);

                const url = `${this.API_BASE}/repos/${this.REPO}/contents/${filePath}`;
                const body = { message: `upload: file ${fileId}`, content: b64 };

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${this.TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!response.ok) throw new Error(`文件上传失败: HTTP ${response.status}`);
                return filePath;
            },

            // 删除GitHub上的独立文件
            async deleteFile(filePath, fileSha) {
                const url = `${this.API_BASE}/repos/${this.REPO}/contents/${filePath}`;
                // 先获取文件的SHA
                if (!fileSha) {
                    const metaResp = await fetch(url, {
                        headers: { 'Authorization': `token ${this.TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (metaResp.ok) {
                        const meta = await metaResp.json();
                        fileSha = meta.sha;
                    }
                }
                if (!fileSha) return; // 文件不存在，跳过

                const body = { message: `delete: ${filePath}`, sha: fileSha };
                await fetch(url, {
                    method: 'DELETE',
                    headers: { 'Authorization': `token ${this.TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            },

            // 获取文件的下载URL
            getFileUrl(doc) {
                if (doc.filePath) {
                    return `https://api.github.com/repos/${this.REPO}/contents/${doc.filePath}?raw=true`;
                }
                return null;
            },

            // 下载文件内容为Blob
            async downloadFileAsBlob(doc) {
                const url = this.getFileUrl(doc);
                if (!url) return null;
                const resp = await fetch(url, {
                    headers: { 'Authorization': `token ${this.TOKEN}` }
                });
                if (!resp.ok) throw new Error(`下载失败: HTTP ${resp.status}`);
                return await resp.blob();
            },

            getDocuments() { return this.data?.documents || []; },

            // 添加文档：先上传文件，再更新元数据
            async addDocument(doc) {
                const fileBuffer = doc._fileBuffer; // ArrayBuffer of file content
                const fileName = doc.name;
                delete doc._fileBuffer;
                delete doc.fileContent;
                delete doc.blob;

                const uploadTime = new Date().toISOString();
                let newId;

                // Step 1: 先确定ID（需要加载最新数据）
                await this.load();
                newId = this.generateId();
                doc.id = newId;
                doc.uploadTime = uploadTime;

                // Step 2: 上传文件到独立存储
                const filePath = await this.uploadFile(newId, fileName, fileBuffer);
                doc.filePath = filePath;

                // Step 3: 更新元数据到data.json
                await this._reloadAndApply(() => {
                    if (!this.data) this.data = { version: 3, storageMode: 'separate', documents: [], lastUpdated: '' };
                    if (!this.data.documents) this.data.documents = [];
                    this.data.documents.push(doc);
                    this.data.lastUpdated = new Date().toLocaleString('zh-CN');
                });

                return doc;
            },

            // 更新文档元数据
            async updateDocument(id, updates) {
                await this._reloadAndApply(() => {
                    if (!this.data) return;
                    const idx = this.data.documents.findIndex(d => d.id === id);
                    if (idx !== -1) {
                        this.data.documents[idx] = { ...this.data.documents[idx], ...updates };
                        this.data.lastUpdated = new Date().toLocaleString('zh-CN');
                    }
                });
            },

            // 删除文档：先删文件，再删元数据
            async deleteDocument(id) {
                // 先找到文件路径
                await this.load();
                const doc = this.data.documents.find(d => d.id === id);
                const filePath = doc?.filePath;

                // 删除独立文件
                if (filePath) {
                    try { await this.deleteFile(filePath); } catch(e) { console.warn('删除文件失败:', e); }
                }

                // 删除元数据
                await this._reloadAndApply(() => {
                    if (!this.data) return;
                    this.data.documents = this.data.documents.filter(d => d.id !== id);
                    this.data.lastUpdated = new Date().toLocaleString('zh-CN');
                });
            },

            // 清空所有文档
            async clearDocuments() {
                // 删除所有独立文件
                await this.load();
                for (const doc of (this.data.documents || [])) {
                    if (doc.filePath) {
                        try { await this.deleteFile(doc.filePath); } catch(e) { console.warn(e); }
                    }
                }
                // 清空元数据
                await this._reloadAndApply(() => {
                    if (!this.data) return;
                    this.data.documents = [];
                    this.data.lastUpdated = new Date().toLocaleString('zh-CN');
                });
            },

            generateId() {
                if (!this.data || !this.data.documents) return 1;
                const maxId = this.data.documents.reduce((max, d) => Math.max(max, d.id || 0), 0);
                return maxId + 1;
            },

            // Base64转Blob (兼容旧数据)
            base64ToBlob(base64, type) {
                if (!base64) return null;
                if (typeof base64 === 'object') return base64;
                try {
                    const byteString = atob(base64.split(',')[1] || base64);
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                    return new Blob([ab], { type: type || 'application/octet-stream' });
                } catch (e) { return null; }
            },

            blobToBase64(blob) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            }
        };

        // ========== 配置常量 ==========
        const CATEGORIES = [
            { id: 'contract', name: '合同协议', icon: '📄', color: 'var(--cat-contract)',
              keywords: ['合同', '协议', 'contract', 'agreement', 'MOU', '框架', '补充', '续签', '续约', '签约', '条款', '契约'] },
            { id: 'certificate', name: '公司证照', icon: '🏢', color: 'var(--cat-certificate)',
              keywords: ['营业执照', '资质', '许可证', '专利', '商标', '证书', '登记', '备案', '认证', '许可', '执照', '代码证'] },
            { id: 'legal', name: '法律文件', icon: '⚖️', color: 'var(--cat-legal)',
              keywords: ['法律', '法务', '诉讼', '判决', 'compliance', 'legal', '律师函', '仲裁', '纠纷', '维权', '合规', '裁定'] },
            { id: 'finance', name: '财务档案', icon: '💰', color: 'var(--cat-finance)',
              keywords: ['发票', '报销', '财务', '预算', 'invoice', 'receipt', 'tax', '付款', '对账', '结算', '审计', '税务', '账目', '费用', '成本'] },
            { id: 'hr', name: '人事档案', icon: '👥', color: 'var(--cat-hr)',
              keywords: ['员工', '人事', 'HR', '薪酬', '培训', '考勤', '招聘', '入职', '离职', '绩效', '社保', '公积金', '劳动合同'] },
            { id: 'admin', name: '行政公文', icon: '📋', color: 'var(--cat-admin)',
              keywords: ['通知', '公告', '行政', 'policy', '制度', '规章', '会议纪要', '审批', '公文', '流程', '管理办法', '章程'] },
            { id: 'business', name: '业务资料', icon: '🤝', color: 'var(--cat-business)',
              keywords: ['客户', '供应商', '报价', '招标', '投标', '采购', '商务', '合作', '意向书', '询价', '订单', '销售'] },
            { id: 'project', name: '项目资料', icon: '📊', color: 'var(--cat-project)',
              keywords: ['项目', 'plan', 'PRD', '需求', 'milestone', '进度', '立项', '验收', '实施', '排期', '里程碑'] },
            { id: 'tech', name: '技术文档', icon: '🔧', color: 'var(--cat-tech)',
              keywords: ['技术', '规范', '标准', '设计', 'spec', 'API', '架构', '接口', '手册', '说明书', '操作指南'] },
            { id: 'other', name: '其他', icon: '📁', color: 'var(--cat-other)', keywords: [] }
        ];

        const FILE_TYPES = {
            'application/pdf': { icon: '📕', color: '#ef4444', name: 'PDF' },
            'application/msword': { icon: '📘', color: '#3b82f6', name: 'Word' },
            'application/vnd.openxmlformats-officedocument.wordprocessingml.document': { icon: '📘', color: '#3b82f6', name: 'Word' },
            'application/vnd.ms-excel': { icon: '📗', color: '#10b981', name: 'Excel' },
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': { icon: '📗', color: '#10b981', name: 'Excel' },
            'application/vnd.ms-powerpoint': { icon: '📙', color: '#f59e0b', name: 'PPT' },
            'application/vnd.openxmlformats-officedocument.presentationml.presentation': { icon: '📙', color: '#f59e0b', name: 'PPT' },
            'text/plain': { icon: '📝', color: '#6b7280', name: '文本' },
            'text/markdown': { icon: '📝', color: '#6b7280', name: 'Markdown' },
            'application/json': { icon: '📋', color: '#6366f1', name: 'JSON' },
            'text/csv': { icon: '📊', color: '#14b8a6', name: 'CSV' },
            'image/jpeg': { icon: '🖼️', color: '#ec4899', name: '图片' },
            'image/png': { icon: '🖼️', color: '#ec4899', name: '图片' },
            'image/gif': { icon: '🖼️', color: '#ec4899', name: '图片' },
            'image/bmp': { icon: '🖼️', color: '#ec4899', name: '图片' }
        };

        const EXT_TYPE_MAP = {
            '.pdf': 'application/pdf',
            '.doc': 'application/msword',
            '.docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            '.xls': 'application/vnd.ms-excel',
            '.xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            '.ppt': 'application/vnd.ms-powerpoint',
            '.pptx': 'application/vnd.openxmlformats-officedocument.presentationml.presentation',
            '.txt': 'text/plain',
            '.md': 'text/markdown',
            '.json': 'application/json',
            '.csv': 'text/csv',
            '.jpg': 'image/jpeg',
            '.jpeg': 'image/jpeg',
            '.png': 'image/png',
            '.gif': 'image/gif',
            '.bmp': 'image/bmp'
        };

        // ========== 应用主类 ==========
        class DocClassificationApp {
            constructor() {
                this.files = [];
                this.currentCategory = 'all';
                this.currentView = 'grid';
                this.currentFile = null;
                this.searchQuery = '';
                this.sortOrder = 'time-desc';
                this.confirmCallback = null;
                this.currentUploader = 'all';
            }

            // 初始化应用
            async init() {
                // 绑定事件
                this.bindEvents();
                
                let loadSuccess = false;
                try {
                    this.showInitLoading('正在从云端同步数据...');
                    
                    // 从GitHub加载数据
                    await GitHubDataManager.load();
                    
                    // 将GitHub数据转换为本地文件格式
                    this.loadFilesFromGitHub();
                    loadSuccess = true;
                } catch (error) {
                    console.error('云端加载失败，使用空数据启动:', error);
                    // 加载失败时，初始化空数据
                    GitHubDataManager.data = { version: 2, documents: [], lastUpdated: '' };
                    GitHubDataManager.sha = null;
                    this.files = [];
                }
                
                // 无论加载成功与否，都显示界面
                this.hideInitOverlay();
                
                // 渲染UI
                this.render();
                
                // 恢复上次输入的上传人姓名
                const uploaderInput = document.getElementById('uploaderNameInput');
                if (uploaderInput) {
                    const lastUploader = localStorage.getItem('docvault_last_uploader');
                    if (lastUploader) uploaderInput.value = lastUploader;
                }
                
                if (loadSuccess) {
                    this.showToast('数据同步成功', 'success');
                } else {
                    this.showToast('云端同步失败，以空数据启动', 'error');
                }
            }

            // 显示初始化加载状态
            showInitLoading(message) {
                const overlay = document.getElementById('initOverlay');
                const messageEl = document.getElementById('initMessage');
                const errorBox = document.getElementById('errorBox');
                
                if (messageEl) messageEl.textContent = message;
                if (errorBox) errorBox.style.display = 'none';
                if (overlay) overlay.classList.remove('hidden');
            }

            // 隐藏初始化界面
            hideInitOverlay() {
                const overlay = document.getElementById('initOverlay');
                if (overlay) overlay.classList.add('hidden');
            }

            // 显示初始化错误
            showInitError(message) {
                const errorBox = document.getElementById('errorBox');
                const errorMessage = document.getElementById('errorMessage');
                const overlay = document.getElementById('initOverlay');
                
                if (errorMessage) errorMessage.textContent = message;
                if (errorBox) errorBox.style.display = 'block';
                if (overlay) overlay.classList.remove('hidden');
            }

            // 从GitHub数据加载文件（v3: 文件按需下载，不预加载blob）
            loadFilesFromGitHub() {
                const docs = GitHubDataManager.getDocuments();
                this.files = docs.map(d => ({
                    ...d,
                    blob: null // v3: 文件按需下载，不预加载
                }));
            }

            // 同步数据
            async syncData() {
                try {
                    this.showToast('正在同步...', 'loading');
                    await GitHubDataManager.load();
                    this.loadFilesFromGitHub();
                    this.render();
                    this.showToast('同步成功', 'success');
                } catch (error) {
                    console.error('同步失败:', error);
                    this.showToast('同步失败: ' + error.message, 'error');
                }
            }

            // 绑定事件
            bindEvents() {
                // 上传区域
                const uploadZone = document.getElementById('uploadZone');
                const fileInput = document.getElementById('fileInput');
                const uploaderInputWrap = document.getElementById('uploaderInputWrap');
                
                uploaderInputWrap.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
                
                uploadZone.addEventListener('click', () => fileInput.click());
                uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadZone.classList.add('dragover');
                });
                uploadZone.addEventListener('dragleave', () => {
                    uploadZone.classList.remove('dragover');
                });
                uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadZone.classList.remove('dragover');
                    this.handleFiles(e.dataTransfer.files);
                });
                fileInput.addEventListener('change', (e) => {
                    this.handleFiles(e.target.files);
                    fileInput.value = '';
                });

                // 搜索
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchQuery = e.target.value.toLowerCase();
                    this.renderFiles();
                });

                // 视图切换
                document.querySelectorAll('.view-toggle button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentView = btn.dataset.view;
                        this.renderFiles();
                    });
                });

                // 排序
                document.getElementById('sortSelect').addEventListener('change', (e) => {
                    this.sortOrder = e.target.value;
                    this.renderFiles();
                });

                // 详情面板
                document.getElementById('detailClose').addEventListener('click', () => this.closeDetail());
                document.getElementById('downloadBtn').addEventListener('click', () => this.downloadFile());
                document.getElementById('deleteBtn').addEventListener('click', () => this.confirmDelete());

                // 设置面板
                document.getElementById('settingsBtn').addEventListener('click', () => this.openSettings());
                document.getElementById('settingsClose').addEventListener('click', () => this.closeSettings());
                document.getElementById('settingsOverlay').addEventListener('click', () => this.closeSettings());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportData());
                document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importInput').click());
                document.getElementById('importInput').addEventListener('change', (e) => this.importData(e));
                document.getElementById('clearAllBtn').addEventListener('click', () => this.confirmClearAll());
                document.getElementById('syncBtn').addEventListener('click', () => this.syncData());

                // 确认弹窗
                document.getElementById('confirmCancel').addEventListener('click', () => this.closeConfirm());
                document.getElementById('confirmOk').addEventListener('click', () => {
                    if (this.confirmCallback) this.confirmCallback();
                    this.closeConfirm();
                });

                // 侧边栏折叠
                document.getElementById('collapseBtn').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('collapsed');
                });
            }

            // 处理上传的文件
            async handleFiles(fileList) {
                const validExtensions = ['.pdf', '.doc', '.docx', '.xls', '.xlsx', '.ppt', '.pptx', '.txt', '.md', '.json', '.csv', '.jpg', '.jpeg', '.png', '.gif', '.bmp'];
                
                const uploaderInput = document.getElementById('uploaderNameInput');
                const uploaderName = uploaderInput ? uploaderInput.value.trim() : '';
                
                if (uploaderName && uploaderInput) {
                    localStorage.setItem('docvault_last_uploader', uploaderName);
                }
                
                for (const file of fileList) {
                    try {
                        const ext = '.' + file.name.split('.').pop().toLowerCase();
                        if (!validExtensions.includes(ext)) {
                            this.showToast(`不支持的文件格式: ${ext}`, 'error');
                            continue;
                        }

                        const fileInfo = await this.processFile(file);
                        fileInfo.uploader = uploaderName || '未知';
                        
                        // 添加到GitHub（v3: 传_fileBuffer，不传base64）
                        const docToSave = {
                            ...fileInfo,
                            _fileBuffer: fileInfo._fileBuffer
                        };
                        delete docToSave.blob;
                        delete docToSave.fileContent;
                        
                        await GitHubDataManager.addDocument(docToSave);
                        
                        // 更新本地文件列表
                        delete fileInfo.fileContent;
                        delete fileInfo._fileBuffer;
                        fileInfo.id = docToSave.id;
                        fileInfo.uploadTime = docToSave.uploadTime;
                        fileInfo.filePath = docToSave.filePath;
                        this.files.push(fileInfo);
                        
                        // 高亮动画
                        setTimeout(() => {
                            const card = document.querySelector(`[data-id="${fileInfo.id}"]`);
                            if (card) card.classList.add('highlight');
                        }, 100);
                        
                        this.showToast(`已上传: ${file.name}`, 'success');
                    } catch (error) {
                        console.error('文件处理失败:', error);
                        const errMsg = error.message || '未知错误';
                        this.showToast(`上传失败: ${file.name}（${errMsg}）`, 'error');
                    }
                }
                
                this.render();
            }

            // 处理单个文件
            async processFile(file) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                const mimeType = EXT_TYPE_MAP[ext] || file.type || 'application/octet-stream';
                const typeInfo = FILE_TYPES[mimeType] || { icon: '📎', color: '#6b7280', name: '其他' };
                
                // 使用 FileReader 读取文件
                const arrayBuffer = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(new Error('文件读取失败: ' + file.name));
                    reader.readAsArrayBuffer(file);
                });
                
                // 生成摘要（文本类文件）
                let summary = '';
                if (['text/plain', 'text/markdown', 'application/json', 'text/csv'].includes(mimeType)) {
                    try {
                        const text = new TextDecoder().decode(arrayBuffer).substring(0, 500);
                        summary = text;
                    } catch (e) {
                        summary = '(无法读取文件内容)';
                    }
                }

                // 自动分类
                const category = this.autoClassify(file.name);

                return {
                    name: file.name,
                    size: file.size,
                    type: mimeType,
                    typeName: typeInfo.name,
                    icon: typeInfo.icon,
                    color: typeInfo.color,
                    category: category,
                    tags: [],
                    summary: summary,
                    _fileBuffer: arrayBuffer,  // v3: 传原始ArrayBuffer，不再base64
                    blob: null
                };
            }

            // 自动分类
            autoClassify(filename) {
                const lowerName = filename.toLowerCase();
                
                for (const cat of CATEGORIES) {
                    if (cat.id === 'other') continue;
                    for (const keyword of cat.keywords) {
                        if (lowerName.includes(keyword.toLowerCase())) {
                            return cat.id;
                        }
                    }
                }
                
                return 'other';
            }

            // 渲染整个应用
            render() {
                this.renderCategories();
                this.renderStats();
                this.renderFiles();
            }

            // 渲染分类导航
            renderCategories() {
                const nav = document.getElementById('categoryNav');
                const counts = this.getCategoryCounts();
                
                let html = `
                    <div class="nav-item ${this.currentCategory === 'all' ? 'active' : ''}" data-category="all">
                        <span class="icon">📂</span>
                        <span class="category-name">全部文件</span>
                        <span class="category-count">${this.files.length}</span>
                    </div>
                `;
                
                CATEGORIES.forEach(cat => {
                    const count = counts[cat.id] || 0;
                    html += `
                        <div class="nav-item ${this.currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">
                            <span class="icon">${cat.icon}</span>
                            <span class="category-name">${cat.name}</span>
                            <span class="category-count">${count}</span>
                        </div>
                    `;
                });
                
                // 上传人筛选区域
                const uploaders = [...new Set(this.files.map(f => f.uploader || '未知'))].filter(u => u);
                if (uploaders.length > 0) {
                    html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);">';
                    html += '<div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;padding:0 12px;margin-bottom:6px;">上传人</div>';
                    html += `<div class="nav-item ${this.currentUploader === 'all' ? 'active' : ''}" data-uploader="all">
                        <span class="icon">👤</span>
                        <span class="category-name">全部上传人</span>
                        <span class="category-count">${this.files.length}</span>
                    </div>`;
                    uploaders.forEach(u => {
                        const count = this.files.filter(f => (f.uploader || '未知') === u).length;
                        html += `<div class="nav-item ${this.currentUploader === u ? 'active' : ''}" data-uploader="${u}">
                            <span class="icon">👤</span>
                            <span class="category-name">${u}</span>
                            <span class="category-count">${count}</span>
                        </div>`;
                    });
                    html += '</div>';
                }
                
                nav.innerHTML = html;
                
                // 绑定分类点击事件
                nav.querySelectorAll('.nav-item[data-category]').forEach(item => {
                    item.addEventListener('click', () => {
                        nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        this.currentCategory = item.dataset.category;
                        this.currentUploader = 'all';
                        this.renderFiles();
                    });
                });

                nav.querySelectorAll('.nav-item[data-uploader]').forEach(item => {
                    item.addEventListener('click', () => {
                        nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        this.currentUploader = item.dataset.uploader;
                        this.currentCategory = 'all';
                        this.renderFiles();
                    });
                });
            }

            // 获取分类统计
            getCategoryCounts() {
                const counts = {};
                CATEGORIES.forEach(cat => {
                    counts[cat.id] = this.files.filter(f => f.category === cat.id).length;
                });
                return counts;
            }

            // 渲染统计
            renderStats() {
                const stats = document.getElementById('headerStats');
                const totalSize = this.files.reduce((sum, f) => sum + (f.size || 0), 0);
                const uploaders = [...new Set(this.files.map(f => f.uploader || '未知'))].length;
                
                stats.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${this.files.length}</div>
                        <div class="stat-label">文件数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${this.formatSize(totalSize)}</div>
                        <div class="stat-label">总大小</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${uploaders}</div>
                        <div class="stat-label">上传人</div>
                    </div>
                `;
            }

            // 渲染文件列表
            renderFiles() {
                const container = document.getElementById('filesContainer');
                
                let filtered = this.filterFiles();
                filtered = this.sortFiles(filtered);
                
                document.getElementById('resultsCount').textContent = `共 ${filtered.length} 个文件`;
                
                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <h3>${this.searchQuery || this.currentCategory !== 'all' ? '未找到匹配文件' : '暂无文件'}</h3>
                            <p>${this.searchQuery || this.currentCategory !== 'all' ? '尝试调整搜索条件' : '点击上方区域或拖拽文件开始上传'}</p>
                        </div>
                    `;
                    return;
                }
                
                if (this.currentView === 'grid') {
                    container.innerHTML = `<div class="files-grid">${filtered.map(f => this.renderFileCard(f)).join('')}</div>`;
                } else {
                    container.innerHTML = `
                        <div class="files-list">
                            <div class="list-header">
                                <div>文件名</div>
                                <div>分类</div>
                                <div>上传人</div>
                                <div>大小</div>
                                <div>上传时间</div>
                                <div>操作</div>
                            </div>
                            ${filtered.map(f => this.renderListItem(f)).join('')}
                        </div>
                    `;
                }
                
                // 绑定文件点击事件
                container.querySelectorAll('.file-card, .list-item').forEach(item => {
                    item.addEventListener('click', () => this.openDetail(parseInt(item.dataset.id)));
                });
                
                // 绑定删除按钮事件
                container.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.confirmDeleteFile(parseInt(btn.dataset.id));
                    });
                });
            }

            // 渲染文件卡片
            renderFileCard(file) {
                const cat = CATEGORIES.find(c => c.id === file.category) || CATEGORIES[CATEGORIES.length - 1];
                const tags = file.tags.map(t => `<span class="tag">${t}</span>`).join('');
                const date = new Date(file.uploadTime).toLocaleDateString('zh-CN');
                const size = this.formatSize(file.size);
                
                return `
                    <div class="file-card" data-id="${file.id}">
                        <div class="file-card-icon" style="color: ${file.color}">${file.icon}</div>
                        <div class="file-card-name" title="${file.name}">${file.name}</div>
                        <div class="file-card-meta">
                            <span>${size}</span>
                            <span>${date}</span>
                        </div>
                        <span class="file-card-category cat-${file.category}">${cat.icon} ${cat.name}</span>
                        ${file.uploader ? `<div style="font-size:11px;color:var(--text-gray);margin-top:4px;">👤 ${file.uploader}</div>` : ''}
                        ${tags ? `<div class="file-card-tags">${tags}</div>` : ''}
                    </div>
                `;
            }

            // 渲染列表项
            renderListItem(file) {
                const cat = CATEGORIES.find(c => c.id === file.category) || CATEGORIES[CATEGORIES.length - 1];
                const date = new Date(file.uploadTime).toLocaleDateString('zh-CN');
                const size = this.formatSize(file.size);
                
                return `
                    <div class="list-item" data-id="${file.id}">
                        <div class="list-item-name">
                            <span style="color: ${file.color}">${file.icon}</span>
                            <span title="${file.name}">${file.name}</span>
                        </div>
                        <div><span class="file-card-category cat-${file.category}">${cat.name}</span></div>
                        <div style="font-size:13px;color:var(--text-gray);">${file.uploader || '未知'}</div>
                        <div>${size}</div>
                        <div>${date}</div>
                        <div class="list-item-actions">
                            <button class="delete-btn" data-id="${file.id}">删除</button>
                        </div>
                    </div>
                `;
            }

            // 过滤文件
            filterFiles() {
                return this.files.filter(f => {
                    if (this.currentCategory !== 'all' && f.category !== this.currentCategory) {
                        return false;
                    }
                    
                    if (this.currentUploader && this.currentUploader !== 'all' && (f.uploader || '未知') !== this.currentUploader) {
                        return false;
                    }
                    
                    if (this.searchQuery) {
                        const searchIn = [
                            f.name.toLowerCase(),
                            f.category.toLowerCase(),
                            f.tags.join(' ').toLowerCase(),
                            (f.summary || '').toLowerCase(),
                            (f.uploader || '').toLowerCase()
                        ].join(' ');
                        
                        if (!searchIn.includes(this.searchQuery)) {
                            return false;
                        }
                    }
                    
                    return true;
                });
            }

            // 排序文件
            sortFiles(files) {
                const sorted = [...files];
                switch (this.sortOrder) {
                    case 'time-desc':
                        sorted.sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime));
                        break;
                    case 'time-asc':
                        sorted.sort((a, b) => new Date(a.uploadTime) - new Date(b.uploadTime));
                        break;
                    case 'name-asc':
                        sorted.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
                        break;
                    case 'name-desc':
                        sorted.sort((a, b) => b.name.localeCompare(a.name, 'zh-CN'));
                        break;
                    case 'size-desc':
                        sorted.sort((a, b) => b.size - a.size);
                        break;
                    case 'size-asc':
                        sorted.sort((a, b) => a.size - b.size);
                        break;
                }
                return sorted;
            }

            // 打开详情面板
            openDetail(fileId) {
                const file = this.files.find(f => f.id === fileId);
                if (!file) return;
                
                this.currentFile = file;
                const panel = document.getElementById('detailPanel');
                const body = document.getElementById('detailBody');
                
                const tagsHtml = file.tags.map(t => `
                    <span class="detail-tag">
                        ${t}
                        <button onclick="app.removeTag(${fileId}, '${t.replace(/'/g, "\\'")}')">×</button>
                    </span>
                `).join('');
                
                body.innerHTML = `
                    <div class="detail-icon" style="color: ${file.color}">${file.icon}</div>
                    
                    <div class="detail-field">
                        <div class="detail-label">文件名</div>
                        <div class="detail-value filename">${file.name}</div>
                    </div>
                    
                    <div class="detail-field">
                        <div class="detail-label">文件类型</div>
                        <div class="detail-value">${file.typeName}</div>
                    </div>
                    
                    <div class="detail-field">
                        <div class="detail-label">文件大小</div>
                        <div class="detail-value">${this.formatSize(file.size)}</div>
                    </div>
                    
                    <div class="detail-field">
                        <div class="detail-label">上传时间</div>
                        <div class="detail-value">${new Date(file.uploadTime).toLocaleString('zh-CN')}</div>
                    </div>
                    
                    <div class="detail-field">
                        <div class="detail-label">上传人</div>
                        <div class="detail-value">👤 ${file.uploader || '未知'}</div>
                    </div>
                    
                    <div class="detail-field">
                        <div class="detail-label">分类</div>
                        <select class="detail-category-select" id="categorySelect" onchange="app.changeCategory(${fileId}, this.value)">
                            ${CATEGORIES.map(c => `
                                <option value="${c.id}" ${c.id === file.category ? 'selected' : ''}>
                                    ${c.icon} ${c.name}
                                </option>
                            `).join('')}
                        </select>
                    </div>
                    
                    <div class="detail-field">
                        <div class="detail-label">标签</div>
                        <div class="detail-tags" id="tagsContainer">
                            ${tagsHtml || '<span style="color: var(--text-light)">暂无标签</span>'}
                        </div>
                        <div class="add-tag-form">
                            <input type="text" id="newTagInput" placeholder="输入标签后按回车添加" 
                                   onkeypress="if(event.key==='Enter') app.addTag(${fileId})">
                        </div>
                    </div>
                    
                    ${file.summary ? `
                        <div class="detail-field">
                            <div class="detail-label">摘要</div>
                            <div class="detail-summary">${file.summary}</div>
                        </div>
                    ` : ''}
                `;
                
                panel.classList.add('open');
            }

            // 关闭详情面板
            closeDetail() {
                document.getElementById('detailPanel').classList.remove('open');
                this.currentFile = null;
            }

            // 更改分类
            async changeCategory(fileId, newCategory) {
                const file = this.files.find(f => f.id === fileId);
                if (!file) return;
                
                file.category = newCategory;
                
                await GitHubDataManager.updateDocument(fileId, { category: newCategory });
                
                this.render();
                this.openDetail(fileId);
                this.showToast('分类已更新', 'success');
            }

            // 添加标签
            async addTag(fileId) {
                const input = document.getElementById('newTagInput');
                const tag = input.value.trim();
                if (!tag) return;
                
                const file = this.files.find(f => f.id === fileId);
                if (!file) return;
                
                if (file.tags.includes(tag)) {
                    this.showToast('标签已存在', 'error');
                    return;
                }
                
                file.tags.push(tag);
                
                await GitHubDataManager.updateDocument(fileId, { tags: file.tags });
                
                input.value = '';
                this.openDetail(fileId);
                this.renderFiles();
                this.showToast('标签已添加', 'success');
            }

            // 移除标签
            async removeTag(fileId, tag) {
                const file = this.files.find(f => f.id === fileId);
                if (!file) return;
                
                file.tags = file.tags.filter(t => t !== tag);
                
                await GitHubDataManager.updateDocument(fileId, { tags: file.tags });
                
                this.openDetail(fileId);
                this.renderFiles();
                this.showToast('标签已移除', 'success');
            }

            // 下载文件
            async downloadFile() {
                if (!this.currentFile) return;
                
                const file = this.currentFile;
                let blob = file.blob;
                
                // v3: 按需从GitHub下载文件
                if (!blob && file.filePath) {
                    try {
                        this.showToast('正在下载文件...', 'loading');
                        blob = await GitHubDataManager.downloadFileAsBlob(file);
                    } catch (e) {
                        this.showToast('下载失败: ' + e.message, 'error');
                        return;
                    }
                }
                
                // 兼容旧数据（base64内嵌）
                if (!blob && file.fileContent) {
                    const byteString = atob(file.fileContent.split(',')[1]);
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                    blob = new Blob([ab], { type: file.type });
                }
                
                if (blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } else {
                    this.showToast('文件数据不可用', 'error');
                }
            }

            // 确认删除
            confirmDelete() {
                if (!this.currentFile) return;
                this.confirmDeleteFile(this.currentFile.id);
            }

            // 删除文件确认
            confirmDeleteFile(fileId) {
                const file = this.files.find(f => f.id === fileId);
                if (!file) return;
                
                this.confirmCallback = async () => {
                    await GitHubDataManager.deleteDocument(fileId);
                    this.files = this.files.filter(f => f.id !== fileId);
                    this.closeDetail();
                    this.render();
                    this.showToast(`已删除: ${file.name}`, 'success');
                };
                
                document.getElementById('confirmTitle').textContent = '确认删除';
                document.getElementById('confirmMessage').textContent = `确定要删除文件 "${file.name}" 吗？此操作不可撤销。`;
                document.getElementById('confirmModal').classList.add('open');
            }

            // 关闭确认弹窗
            closeConfirm() {
                document.getElementById('confirmModal').classList.remove('open');
                this.confirmCallback = null;
            }

            // 打开设置
            openSettings() {
                document.getElementById('settingsOverlay').classList.add('open');
                document.getElementById('settingsPanel').classList.add('open');
            }

            // 关闭设置
            closeSettings() {
                document.getElementById('settingsOverlay').classList.remove('open');
                document.getElementById('settingsPanel').classList.remove('open');
            }

            // 导出数据（v3: 仅导出元数据，不含文件内容）
            async exportData() {
                try {
                    const exportDocs = this.files.map(f => {
                        const { blob, _fileBuffer, ...rest } = f;
                        return rest;
                    });
                    
                    const exportData = {
                        version: 3,
                        storageMode: 'separate',
                        exportTime: new Date().toISOString(),
                        documents: exportDocs,
                        lastUpdated: new Date().toLocaleString('zh-CN')
                    };
                    
                    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `文档分类备份_${new Date().toISOString().slice(0,10)}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    this.closeSettings();
                    this.showToast('元数据导出成功（文件存储在云端，不受影响）', 'success');
                } catch (error) {
                    console.error('导出失败:', error);
                    this.showToast('导出失败', 'error');
                }
            }

            // 导入数据（v3: 仅导入元数据，兼容旧版带文件内容的备份）
            async importData(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                try {
                    const text = await file.text();
                    const importData = JSON.parse(text);
                    
                    if (!importData.documents || !Array.isArray(importData.documents)) {
                        throw new Error('无效的备份文件格式');
                    }
                    
                    this.showToast(`正在导入 ${importData.documents.length} 条记录...`, 'loading');
                    
                    // 导入元数据（文件内容已在云端的不用重新上传）
                    await GitHubDataManager._reloadAndApply(() => {
                        for (const f of importData.documents) {
                            const existing = this.data.documents?.find(d => d.name === f.name);
                            if (!existing) {
                                if (!this.data.documents) this.data.documents = [];
                                const newId = this.generateId();
                                this.data.documents.push({
                                    id: newId,
                                    name: f.name,
                                    size: f.size,
                                    type: f.type,
                                    typeName: f.typeName,
                                    icon: f.icon,
                                    color: f.color,
                                    category: f.category || 'other',
                                    tags: f.tags || [],
                                    summary: f.summary || '',
                                    uploader: f.uploader || '未知',
                                    uploadTime: f.uploadTime || new Date().toISOString(),
                                    filePath: f.filePath || null
                                });
                            }
                        }
                        this.data.lastUpdated = new Date().toLocaleString('zh-CN');
                    });
                    
                    // 重新加载显示
                    await GitHubDataManager.load();
                    this.loadFilesFromGitHub();
                    
                    event.target.value = '';
                    this.closeSettings();
                    this.render();
                    this.showToast(`成功导入 ${this.files.length} 个文件`, 'success');
                } catch (error) {
                    console.error('导入失败:', error);
                    this.showToast('导入失败：' + error.message, 'error');
                }
            }

            // 确认清空所有数据
            confirmClearAll() {
                this.confirmCallback = async () => {
                    await GitHubDataManager.clearDocuments();
                    this.files = [];
                    this.closeSettings();
                    this.closeDetail();
                    this.render();
                    this.showToast('所有数据已清空', 'success');
                };
                
                document.getElementById('confirmTitle').textContent = '确认清空';
                document.getElementById('confirmMessage').textContent = '确定要删除所有文件和分类数据吗？此操作不可撤销！';
                document.getElementById('confirmModal').classList.add('open');
            }

            // 格式化文件大小
            formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            // 显示Toast提示
            showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, type === 'loading' ? 10000 : 3000);
            }
        }

        // ========== 启动应用 ==========
        const app = new DocClassificationApp();
        app.init();
    </script>
</body>
</html>
