            --gradient-warm: linear-gradient(135deg, #fa709a 0%, #fee140 100%);

        .kb-card-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px; }
        .kb-card-type { font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500; }
        .type-tech { background:rgba(79,172,254,.15);color:#4facfe; }
        .type-meeting { background:rgba(240,147,251,.15);color:#f093fb; }
        .type-guide { background:rgba(67,233,123,.15);color:#43e97b; }
        .type-pdf { background:rgba(255,165,2,.15);color:#ffa502; }
        .kb-time { font-size:11px;color:var(--text-muted); }
        .kb-title { font-size:16px;font-weight:600;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
        .kb-snippet { font-size:13px;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5; }

        .kb-tag { font-size:11px;padding:2px 8px;background:rgba(255,255,255,.06);border-radius:4px;color:var(--text-muted); }
        .kb-meta { display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text-muted); }
        .kb-meta span { display:flex;align-items:center;gap:4px; }

        /* ========== 空状态 / 无结果 ========== */
        .empty-state { text-align:center;padding:60px 20px;color:var(--text-muted); }

        .modal-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);z-index:999;display:none;align-items:center;justify-content:center;padding:20px; }

        .detail-header { display:flex;justify-content:space-between;align-items:center;padding:22px 26px;border-bottom:1px solid var(--border-color);flex-shrink:0; }
        .detail-header-left { display:flex;align-items:center;gap:12px; }
        .detail-badge { font-size:11px;padding:4px 12px;border-radius:12px;font-weight:500; }
        .detail-title { font-size:18px;font-weight:600; }
        .detail-close { width:36px;height:36px;border-radius:50%;background:var(--glass-bg);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;color:var(--text-secondary);flex-shrink:0; }
        .detail-close:hover { background:rgba(245,87,108,.2); color:#f5576c; border-color:transparent; }
        .detail-body { padding:26px;overflow-y:auto;flex:1; }
        .detail-body h2 { font-size:16px;font-weight:600;margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border-color);color:var(--text-primary); }
        .detail-body h2:first-child { margin-top:0; }
        .detail-body h3 { font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--text-secondary); }
        .detail-body p, .detail-body li { font-size:14px;color:var(--text-secondary);line-height:1.8;margin-bottom:8px; }
        .detail-body ul, .detail-body ol { padding-left:20px; margin-bottom:12px; }

        .detail-body th, .detail-body td { padding:10px 12px;text-align:left;border:1px solid var(--border-color); }
        .detail-body th { background:rgba(79,172,254,.1);color:var(--text-primary);font-weight:600; }
        .detail-body td { color:var(--text-secondary); }
        .detail-body blockquote { border-left:3px solid #4facfe;padding:10px 16px;margin:12px 0;background:rgba(79,172,254,.05);border-radius:0 8px 8px 0;color:var(--text-secondary);font-style:italic; }
        .detail-body strong { color:var(--text-primary); }
        .detail-body hr { border:none;border-top:1px solid var(--border-color);margin:20px 0; }
        .detail-footer { padding:16px 26px;border-top:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;flex-shrink:0; }
        .detail-footer-info { font-size:12px;color:var(--text-muted); }
        .detail-action-btn { padding:8px 20px;background:var(--gradient-primary);border:none;border-radius:20px;color:white;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s; }
        .detail-action-btn:hover { box-shadow:0 4px 15px rgba(79,172,254,.4); transform:translateY(-1px); }

        /* ========== 返回主站链接 ========== */
        .back-link { display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:20px;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .3s;text-decoration:none;margin-bottom:4px; }
        .back-link:hover { color:var(--text-primary);border-color:rgba(79,172,254,.3); text-decoration:none; }

        /* ========== 响应式 ========== */
        @media (max-width:768px) {

            .detail-modal { max-height:92vh; border-radius:var(--radius-lg); }
        }
        @media (max-width:480px) {
            .stats-row { grid-template-columns:1fr 1fr; gap:10px; }
            .stat-num { font-size:22px; }
        }
    </style>
</head>

const KB_DATA = [
{
    id: 'kb-001',
    title: '宁德维修拍照小程序设计助手（系统提示词 + 任务指令）',
    category: 'tech',
    categoryLabel: '技术方案',
    timeLabel: '昨天更新',
    tags: ['小程序设计', '宁德维修', 'System Prompt', 'R1/R2分级维修', '拍照规范'],
    size: '81KB',
    introduction: '将维修照片采集标准转化为微信小程序「宁家维修拍照资料库」的落地方案。包含完整的系统提示词（角色设定+领域知识）和任务指令（首次触发词），可直接粘贴到 WorkBuddy/Coze/Dify 等平台使用。覆盖 R1/R2 分级维修、PPT 20 类基础照片标准、Excel 72 项拍摄要求。',
    content: `## 一、方案背景与依据

### 1. 录音讨论核心
- 维修分为 **R1（简易维修，如拆底护板/铆钉拉拔）** 与 **R2（复杂维修，如换箱体/铺胶）**，照片要求不同。
- 小程序需支持：电池号扫码（12/24位自动识别PN）、必填/非必填项控制、离线暂存、内部分类归档、报单员一键导出。
- 强调"保证数量+必填项"优先，AI识别可作后期增强。
- 非售后（主机厂）业务需单独备注进出场自拍、工作时长。

### 2. PPT《乘用车市场维修—基础照片》标准
明确20类基础照片：车牌、铭牌/VIN、里程、电池号、维修前后上位机、故障、新/旧件、空位、扭力漆笔、隔离区、封箱、气密、接插件、外出、进/出场、ABA、充放电等。

### 3. Excel《返修拍摄要求0716》整合表
划分 **10大工序环节**，共72项拍照点，精确标注R1/R2数量。

## 二、小程序总体设计

**名称**：宁家维修拍照资料库（企业微信/微信小程序）
**目标**：替代手工记录，按工单引导拍照，自动校验必填数量，形成可追溯照片库。

### 核心业务流程
\`\`\`
创建工单（输/扫码电池号 → 选售后/非售后 + R1/R2）
   ↓
系统生成【个性化拍照清单】（带*为必填，引用PPT示例）
   ↓
技师按工序页签拍照（本地缓存 → 联网提交）
   ↓
资料库自动归类命名（工单_工序_项目_序号）
   ↓
质检员审核（对照标准，高压件触发远程视频）
   ↓
通过后报单员导出外呼格式包
\`\`\`

## 三、关键功能模块

### 模块1：智能工单初始化
- **电池号录入**：支持扫码或手动，自动识别12/24位
- **业务类型选择**：售后/R1、售后/R2、非售后（主机厂）
- **清单生成**：调取Excel表，标记必填

### 模块2：引导式拍照上传
每个拍照项包含：
- **规范要求**：直接引用PPT红字
- **示例图**：嵌入正确/错误照片
- **数量计数器**：R1/R2要求数
- **相机控件**：自带时间/位置水印

| 工序 | 拍照项（部分） | R1数量 | R2数量 |
|------|---------------|--------|--------|
| 来料 | 叉车/电池号/360°视频 | 1/1/1 | 同 |
| 预检 | 车牌、里程(ODO)、上位机 | 1~8 | 同 |
| 气密 | 连接照+合格照(PASS) | 前2后2 | 前2后2 |
| 回装 | 底护板/天体/扭力/漆笔 | 4 | 30(含高压) |

### 模块3：离线缓存与提交
录音指出"外呼不建单码，需先拍手中" → 小程序支持**草稿箱**

### 模块4：资料库与智能校验
- **自动命名**：\`{工单号}_{R1/R2}_{工序}_{项目}_{第n张}_{时间戳}.jpg\`
- **必填拦截**：缺张禁止提交
- **AI预留接口**：车牌OCR、里程ODO识别

### 模块5：质检闭环
- **人工质检**：逐张点选"合格/不合格"
- **远程视频质检**：高压件触发
- **打回机制**：不合格微信通知补拍

### 角色权限表

| 角色 | 权限 |

// ========== 渲染逻辑 ==========
let currentFilter = 'all';
let searchQuery = '';

function renderCards() {
    const grid = document.getElementById('kbGrid');
    let items = KB_DATA;

    // 分类过滤
    if (currentFilter !== 'all') {
        items = items.filter(i => i.category === currentFilter);
    }

    // 搜索过滤
    if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        items = items.filter(i =>
            i.title.toLowerCase().includes(q) ||
            i.introduction.toLowerCase().includes(q) ||
            i.content.toLowerCase().includes(q) ||
            i.tags.some(t => t.toLowerCase().includes(q))
        );
    }

    document.getElementById('resultCount').textContent =
        searchQuery.trim() ? `找到 ${items.length} 条匹配结果` : `共 ${items.length} 条结果`;

    if (items.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配的知识条目</div><div class="empty-hint">试试其他关键词或切换分类</div></div>`;
        return;
    }

    grid.innerHTML = items.map(item => {
        const typeClass = 'type-' + item.category;
        const highlight = searchQuery.trim() ? highlightText(item.introduction, searchQuery) : escapeHtml(item.introduction);
        return `
        <div class="kb-card" onclick="openDetail('${item.id}')">
            <div class="kb-card-header">
                <span class="kb-card-type ${typeClass}">${item.categoryLabel}</span>
                <span class="kb-time">${item.timeLabel}</span>
            </div>
            <div class="kb-title">${escapeHtml(item.title)}</div>
            <div class="kb-snippet">${highlight}</div>
            <div class="kb-tags">${item.tags.map(t => '<span class="kb-tag">'+escapeHtml(t)+'</span>').join('')}</div>
            <div class="kb-meta">
                <span>📄 ${item.size}</span>
                <span>🏷️ ${item.tags.length} 个标签</span>
            </div>
        </div>`;
    }).join('');
}

function highlightText(text, query) {
    if (!query.trim()) return escapeHtml(text);
    const escaped = escapeHtml(text);
    const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${q})`, 'gi');
    return escaped.replace(re, '<mark style="background:rgba(79,172,254,.3);color:#fff;padding:0 2px;border-radius:2px;">$1</mark>');
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ========== 交互 ==========

function setFilter(cat, el) {
    currentFilter = cat;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderCards();
}

function onSearch() {
    searchQuery = document.getElementById('searchInput').value;
    renderCards();
}

function openDetail(id) {
    const item = KB_DATA.find(k => k.id === id);
    if (!item) return;

    const typeClass = 'type-' + item.category;
    document.getElementById('detailBadge').className = 'detail-badge ' + typeClass;
    document.getElementById('detailBadge').textContent = item.categoryLabel;
    document.getElementById('detailTitle').textContent = item.title;
    document.getElementById('detailBody').innerHTML = mdToHtml(item.content);
    document.getElementById('detailMeta').textContent = `${item.timeLabel} · ${item.size} · ${item.tags.join(' / ')}`;
    document.getElementById('modalOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeDetail() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.body.style.overflow = '';
}

function copyContent() {
    const item = KB_DATA.find(k => k.title === document.getElementById('detailTitle').textContent);
    if (!item) return;
    navigator.clipboard.writeText(item.content).then(() => {
        const btn = document.querySelector('.detail-action-btn');
        btn.textContent = '✅ 已复制';
        setTimeout(() => btn.textContent = '📋 复制内容', 2000);
    });
}

function expandAll() {
    // 切换到全部并清除搜索
    currentFilter = 'all';
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.querySelector('.chip-all').classList.add('active');

}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ========== 简易 Markdown → HTML 转换 ==========
function mdToHtml(md) {
    let html = escapeHtml(md);
    // code blocks
    html = html.replace(/\`\`\`(\w*)\n([\s\S]*?)\`\`\`/g, (m, lang, code) =>
        '<pre><code class="lang-'+lang+'">'+code+'</code></pre>');
    // inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // headings
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
    // bold & italic
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // hr
    html = html.replace(/^---$/gm, '<hr>');
    // blockquote
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    // tables
    html = html.replace(/^\|(.+)\|$/gm, (m, row) => {
        const cells = row.split('|').map(c => c.trim());
        if (cells.every(c => /^[-:]+$/.test(c))) return ''; // skip separator
        const tag = cells[0] && /^[^|]*$/.test(row) ? 'th' : 'td';
        return '<tr>' + cells.map(c => '<'+tag+'>'+c+'</'+tag+'>').join('') + '</tr>';
    });
    // wrap consecutive <tr> in <table>
    html = html.replace(/(<tr>[\s\S]*?<\/tr>(?:\s*<tr>[\s\S]*?<\/tr>)*)/g, '<table>$1</table>');
    // ul/ol
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // paragraphs
    html = html.replace(/^(?!<[hublop]|<\/|\s)(.+)$/gm, '<p>$1</p>');
    // clean empty
    html = html.replace(/<p>\s*<\/p>/g, '');
    return html;
}

renderCards();
