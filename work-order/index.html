<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务站工单管理系统</title>
<style>
:root {
  --primary: #2563eb;
  --primary-light: #3b82f6;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-secondary: #64748b;
  --sidebar-w: 220px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Sidebar */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: #1e293b; color: #fff; z-index: 100; display: flex; flex-direction: column; }
.sidebar-brand { padding: 20px 16px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #334155; }
.sidebar-brand small { display: block; font-size: 11px; font-weight: 400; color: #94a3b8; margin-top: 4px; }
.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-section { padding: 8px 16px 4px; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
.nav-item { display: flex; align-items: center; padding: 10px 16px; cursor: pointer; color: #cbd5e1; font-size: 14px; transition: all .15s; border-left: 3px solid transparent; }
.nav-item:hover { background: #334155; color: #fff; }
.nav-item.active { background: #334155; color: #60a5fa; border-left-color: var(--primary); }
.nav-item .icon { width: 20px; margin-right: 10px; text-align: center; font-size: 15px; }
.nav-badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 10px; }

/* Main */
.main { margin-left: var(--sidebar-w); padding: 24px; min-height: 100vh; }

/* Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 700; }
.page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Cards */
.card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.badge-blue { background: #dbeafe; color: var(--primary); }
.badge-green { background: #dcfce7; color: var(--success); }
.badge-yellow { background: #fef3c7; color: var(--warning); }
.badge-red { background: #fee2e2; color: var(--danger); }
.badge-gray { background: #f1f5f9; color: var(--text-secondary); }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 16px; text-align: center; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* Pipeline */
.pipeline { display: flex; align-items: center; gap: 0; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
.pipeline-step { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: all .15s; }
.pipeline-step:hover { border-color: var(--primary); }
.pipeline-step.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pipeline-step.done { background: #dcfce7; border-color: var(--success); color: var(--success); }
.pipeline-arrow { color: #cbd5e1; font-size: 18px; margin: 0 4px; flex-shrink: 0; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8fafc; padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tbody tr:hover { background: #f8fafc; }
tbody tr { cursor: pointer; }

/* Status pills */
.status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-待派工 { background: #f1f5f9; color: #64748b; }
.status-未开工 { background: #f1f5f9; color: #64748b; }
.status-待客户确认 { background: #fef3c7; color: #92400e; }
.status-在修 { background: #dbeafe; color: #1d4ed8; }
.status-已竣工 { background: #d1fae5; color: #065f46; }
.status-维修完成 { background: #d1fae5; color: #065f46; }
.status-已结算 { background: #dcfce7; color: #166534; }
.status-已结清 { background: #dcfce7; color: #166534; }
.status-关闭工单 { background: #f1f5f9; color: #64748b; }
.status-已终止 { background: #fee2e2; color: #991b1b; }

/* Type tabs */
.type-tabs { display: flex; gap: 0; margin-bottom: 20px; background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.type-tab { padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; border-bottom: 2px solid transparent; }
.type-tab:hover { background: #f8fafc; }
.type-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #eff6ff; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #15803d; }
.btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: #fff; color: var(--danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Form */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; transition: border-color .15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.form-textarea { min-height: 60px; resize: vertical; }
.form-input[readonly] { background: #f8fafc; color: var(--text-secondary); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 4px; }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: #fff; }

/* Detail view */
.detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.detail-id { font-size: 18px; font-weight: 700; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 14px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px; color: var(--text-secondary); }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.detail-field { }
.detail-field-label { font-size: 11px; color: var(--text-secondary); }
.detail-field-value { font-size: 14px; font-weight: 500; margin-top: 2px; }

/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: var(--border); }
.timeline-item { position: relative; padding-bottom: 16px; }
.timeline-item::before { content: ''; position: absolute; left: -20px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.timeline-item.done::before { background: var(--success); }
.timeline-item.current::before { background: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,.2); }
.timeline-time { font-size: 11px; color: var(--text-secondary); }
.timeline-content { font-size: 13px; margin-top: 2px; }

/* Filter bar */
.filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.filter-bar .form-input, .filter-bar .form-select { padding: 7px 10px; font-size: 13px; }
.time-filter { display: flex; gap: 0; margin-bottom: 16px; background: #fff; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; width: fit-content; }
.time-btn { padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border: none; background: transparent; color: var(--text); border-right: 1px solid var(--border); }
.time-btn:last-child { border-right: none; }
.time-btn:hover { background: #f8fafc; }
.time-btn.active { color: var(--primary); background: #eff6ff; font-weight: 600; }
.time-filter-label { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); background: #f8fafc; border-right: 1px solid var(--border); display: flex; align-items: center; }
.search-input { min-width: 200px; }

/* Actions in table */
.action-group { display: flex; gap: 4px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 180px; font-size: 12px; }
  .sidebar-brand { font-size: 13px; padding: 8px; }
  .sidebar-brand small { font-size: 9px; }
  .nav-item { padding: 6px 8px; font-size: 11px; }
  .nav-item .icon { font-size: 13px; }
  .nav-section { font-size: 9px; padding: 5px 8px 2px; }
  .nav-badge { font-size: 9px; padding: 1px 4px; }
  .main { margin-left: 180px; }
  .form-grid { grid-template-columns: 1fr; }
  .header { padding: 8px 10px; }
  .header h1 { font-size: 14px; }
  .content { padding: 10px; }
  .stat-card { padding: 8px; }
  .stat-value { font-size: 18px; }
  .stat-label { font-size: 10px; }
}

/* Upload */
.btn-upload { background:#3b82f6; color:#fff; border:none; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:background .15s; }
.btn-upload:hover { background:#2563eb; }
.upload-status-bar { padding:10px 24px; background:#fff; border-bottom:1px solid var(--border); font-size:13px; display:none; align-items:center; gap:8px; border-radius:0 0 10px 10px; margin-bottom:12px; }
.upload-status-bar.show { display:flex; }
.upload-status-bar.success { color:var(--success); background:#f0fdf4; border-color:#bbf7d0; }
.upload-status-bar.error { color:var(--danger); background:#fef2f2; border-color:#fecaca; }
.upload-status-bar.info { color:var(--primary); background:#eff6ff; border-color:#bfdbfe; }
.upload-badge { background:#dbeafe; color:var(--primary); padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }

/* Print */
@media print {
  .sidebar, .btn, .filter-bar, .pipeline { display: none !important; }
  .main { margin-left: 0; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">
    ⚡ 服务站管理
    <small>工单全流程管理</small>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">工作台</div>
    <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
      <span class="icon">📊</span><span>数据看板</span>
    </div>
    <div class="nav-section">工单管理</div>
    <div class="nav-item" data-page="warranty" onclick="switchPage('warranty')">
      <span class="icon">🔧</span><span>保内工单</span><span class="nav-badge" id="nav-badge-wn">0</span>
    </div>
    <div class="nav-item" data-page="nonwarranty" onclick="switchPage('nonwarranty')">
      <span class="icon">🔩</span><span>保外工单</span><span class="nav-badge" id="nav-badge-nw">0</span>
    </div>
    <div class="nav-section">辅助管理</div>
    <div class="nav-item" data-page="warehouse" onclick="switchPage('warehouse')">
      <span class="icon">📦</span><span>仓库登记</span>
    </div>
    <div class="nav-item" data-page="engineers" onclick="switchPage('engineers')">
      <span class="icon">👷</span><span>工程师管理</span>
    </div>
    <div class="nav-section">系统</div>
    <div class="nav-item" data-page="export" onclick="switchPage('export')">
      <span class="icon">📥</span><span>数据导出</span>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="main" id="mainContent">
  <!-- Hidden file input for Excel upload -->
  <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelUpload(this)">
  <!-- Upload status bar -->
  <div class="upload-status-bar" id="uploadStatusBar"></div>
  <!-- Pages will be rendered here -->
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script>
// ===== DATA STORE =====
const STORAGE_KEY = 'station_mgmt_data';

function getDefaultData() {
  return {
    warrantyOrders: [],   // 保内工单
    nonWarrantyOrders: [], // 保外工单
    engineers: ['刘珍','罗永豪','刘星彤','段宇航','杨国志','张峻','李恩浩','李旭东','周大伟','王子辉','苏越','张高丰','张祥英','马迪','张垚','何旭栋'],
    reporters: ['周字欢','刘程程','董慧莹','王鹏','赵轩'],
    warehouseLogs: [],
    idCounters: { wn: 0, nw: 0, wh: 0 }
  };
}

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d) return { ...getDefaultData(), ...d };
  } catch(e) {}
  return getDefaultData();
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let APP = loadData();

function genId(prefix) {
  APP.idCounters[prefix]++;
  saveData(APP);
  const n = String(APP.idCounters[prefix]).padStart(6, '0');
  return prefix === 'wn' ? `WN-${n}` : `NW-${n}`;
}

// ===== PAGE ROUTER =====
let currentPage = 'dashboard';

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage();
}

function renderPage() {
  const main = document.getElementById('mainContent');
  switch(currentPage) {
    case 'dashboard': main.innerHTML = renderDashboard(); break;
    case 'warranty': main.innerHTML = renderWarrantyList(); break;
    case 'nonwarranty': main.innerHTML = renderNonWarrantyList(); break;
    case 'warehouse': main.innerHTML = renderWarehouse(); break;
    case 'engineers': main.innerHTML = renderEngineers(); break;
    case 'export': main.innerHTML = renderExport(); break;
  }
  updateNavBadges();
}

function updateNavBadges() {
  const wnActive = APP.warrantyOrders.filter(o => !['已结清','已终止','关闭工单'].includes(o.status)).length;
  const nwActive = APP.nonWarrantyOrders.filter(o => !['关闭工单'].includes(o.status)).length;
  document.getElementById('nav-badge-wn').textContent = wnActive;
  document.getElementById('nav-badge-nw').textContent = nwActive;
}

// ===== DASHBOARD =====
function renderDashboard() {
  const wn = APP.warrantyOrders;
  const nw = APP.nonWarrantyOrders;
  const wnActive = wn.filter(o => !['已结清','已终止'].includes(o.status));
  const nwActive = nw.filter(o => !['关闭工单'].includes(o.status));
  const wnUnassigned = wn.filter(o => o.status === '未派工').length;
  const nwPending = nw.filter(o => o.status === '待客户确认').length;
  const wnInProgress = wn.filter(o => ['在修','已竣工'].includes(o.status)).length;
  const nwInProgress = nw.filter(o => o.status === '维修完成').length;
  const totalRevenue = nw.reduce((s, o) => s + (parseFloat(o.receivedAmount) || 0), 0);
  const wnRevenue = wn.reduce((s, o) => s + (parseFloat(o.totalFee) || 0), 0);

  // 时间维度统计
  const wnToday = wn.filter(o => isInPeriod(o.registerDate, 'today'));
  const nwToday = nw.filter(o => isInPeriod(o.requestDate, 'today'));
  const wnWeek = wn.filter(o => isInPeriod(o.registerDate, 'week'));
  const nwWeek = nw.filter(o => isInPeriod(o.requestDate, 'week'));
  const wnMonth = wn.filter(o => isInPeriod(o.registerDate, 'month'));
  const nwMonth = nw.filter(o => isInPeriod(o.requestDate, 'month'));
  const revToday = nwToday.reduce((s,o) => s + (parseFloat(o.receivedAmount)||0), 0) + wnToday.reduce((s,o) => s + (parseFloat(o.totalFee)||0), 0);
  const revWeek = nwWeek.reduce((s,o) => s + (parseFloat(o.receivedAmount)||0), 0) + wnWeek.reduce((s,o) => s + (parseFloat(o.totalFee)||0), 0);
  const revMonth = nwMonth.reduce((s,o) => s + (parseFloat(o.receivedAmount)||0), 0) + wnMonth.reduce((s,o) => s + (parseFloat(o.totalFee)||0), 0);

  return `
    <div class="page-header">
      <div><div class="page-title">数据看板</div><div class="page-subtitle">${todayStr()} 实时概览</div></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${wnActive.length + nwActive.length}</div><div class="stat-label">进行中工单</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--warning)">${wnUnassigned}</div><div class="stat-label">保内待派工</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--warning)">${nwPending}</div><div class="stat-label">保外待确认</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--success)">${wnInProgress + nwInProgress}</div><div class="stat-label">维修中/已完成</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--primary)">¥${(totalRevenue + wnRevenue).toLocaleString()}</div><div class="stat-label">累计营收</div></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">📊 时间维度工单统计</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
        <div style="background:#eff6ff;border-radius:10px;padding:16px;border:1px solid #bfdbfe">
          <div style="font-size:13px;color:#3b82f6;font-weight:600;margin-bottom:12px">📅 今日 (${todayStr()})</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#2563eb">${wnToday.length}</div><div style="font-size:11px;color:#64748b">保内工单</div></div>
            <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#d97706">${nwToday.length}</div><div style="font-size:11px;color:#64748b">保外工单</div></div>
          </div>
          <div style="margin-top:10px;text-align:center;font-size:12px;color:#64748b">合计 <b style="color:#1e293b">${wnToday.length + nwToday.length}</b> 单 · 营收 <b style="color:#16a34a">¥${revToday.toLocaleString()}</b></div>
        </div>
        <div style="background:#f0fdf4;border-radius:10px;padding:16px;border:1px solid #bbf7d0">
          <div style="font-size:13px;color:#16a34a;font-weight:600;margin-bottom:12px">📆 本周 (${weekStartStr()} ~ ${todayStr()})</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#2563eb">${wnWeek.length}</div><div style="font-size:11px;color:#64748b">保内工单</div></div>
            <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#d97706">${nwWeek.length}</div><div style="font-size:11px;color:#64748b">保外工单</div></div>
          </div>
          <div style="margin-top:10px;text-align:center;font-size:12px;color:#64748b">合计 <b style="color:#1e293b">${wnWeek.length + nwWeek.length}</b> 单 · 营收 <b style="color:#16a34a">¥${revWeek.toLocaleString()}</b></div>
        </div>
        <div style="background:#fefce8;border-radius:10px;padding:16px;border:1px solid #fde68a">
          <div style="font-size:13px;color:#d97706;font-weight:600;margin-bottom:12px">🗓️ 本月 (${monthStartStr()} ~ ${todayStr()})</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

function renderStatusChart(orders, statuses) {
  const counts = statuses.map(s => orders.filter(o => o.status === s).length);
  const max = Math.max(...counts, 1);
  const colors = ['#64748b','#94a3b8','#3b82f6','#22c55e','#16a34a','#15803d','#dc2626'];
  return `<div style="display:flex;flex-direction:column;gap:8px">
    ${statuses.map((s,i) => `
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:80px;font-size:12px;color:var(--text-secondary);text-align:right">${s}</span>
        <div style="flex:1;height:22px;background:#f1f5f9;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${counts[i]/max*100}%;background:${colors[i%colors.length]};border-radius:4px;transition:width .3s;min-width:${counts[i]>0?'4px':'0'}"></div>
        </div>
        <span style="width:30px;font-size:13px;font-weight:600">${counts[i]}</span>
      </div>
    `).join('')}
  </div>`;
}

function saveNonWarranty(editId) {
  const data = {
    requestDate: document.getElementById('f_nw_requestDate').value,
    city: document.getElementById('f_nw_city').value,
    signedCustomer: document.getElementById('f_nw_signedCustomer').value,
    plateNumber: document.getElementById('f_nw_plateNumber').value,
    barcode: document.getElementById('f_nw_barcode').value,
    vin: document.getElementById('f_nw_vin').value,
    productPN: document.getElementById('f_nw_productPN').value,
    productType: document.getElementById('f_nw_productType').value,
    projectType: document.getElementById('f_nw_projectType').value,
    bizContact: document.getElementById('f_nw_bizContact').value,
    customerName: document.getElementById('f_nw_customerName').value,
    customerPhone: document.getElementById('f_nw_customerPhone').value,
    faultDesc: document.getElementById('f_nw_faultDesc').value,
    repairEngineer: document.getElementById('f_nw_repairEngineer').value,
    repairArea: document.getElementById('f_nw_repairArea').value,
    dealDate: document.getElementById('f_nw_dealDate').value,
    quoteTotal: document.getElementById('f_nw_quoteTotal').value,
    quoteReceivable: document.getElementById('f_nw_quoteReceivable').value,
    partsSale: document.getElementById('f_nw_partsSale').value,
    laborFee: document.getElementById('f_nw_laborFee').value,
    partsCost: document.getElementById('f_nw_partsCost').value,
    logisticsFee: document.getElementById('f_nw_logisticsFee').value,
    profitShare: document.getElementById('f_nw_profitShare').value,
    paymentMethod: document.getElementById('f_nw_paymentMethod').value,
    paymentStatus: document.getElementById('f_nw_paymentStatus').value,
    receivedAmount: document.getElementById('f_nw_receivedAmount').value,
    invoiceAmount: document.getElementById('f_nw_invoiceAmount').value,
    paymentDate: document.getElementById('f_nw_paymentDate').value,
    invoiceDate: document.getElementById('f_nw_invoiceDate').value,
    payCatl: document.getElementById('f_nw_payCatl').value,
    catlInvoice: document.getElementById('f_nw_catlInvoice').value,
    logisticsPayment: document.getElementById('f_nw_logisticsPayment').value,
    logisticsInvoice: document.getElementById('f_nw_logisticsInvoice').value,
    reviewNote: document.getElementById('f_nw_reviewNote').value,
    remark: document.getElementById('f_nw_remark').value,
  };

  if(!data.signedCustomer || !data.plateNumber || !data.faultDesc) {
    alert('请填写必填项：签约客户名称、车牌号、业务需求描述');
    return;
  }

  // auto-calc
  const qt = parseFloat(data.quoteTotal)||0;
  const qr = parseFloat(data.quoteReceivable)||0;
  const ra = parseFloat(data.receivedAmount)||0;
  data.unreceivedAmount = (qr - ra).toFixed(2);
  const pc = parseFloat(data.partsCost)||0;
  const lf = parseFloat(data.logisticsFee)||0;
  const ps = parseFloat(data.profitShare)||0;
  data.grossProfit = (ra - pc - lf - ps).toFixed(2);
  data.grossMargin = ra > 0 ? (data.grossProfit / ra * 100).toFixed(2) + '%' : '';

  if(editId) {
    const idx = APP.nonWarrantyOrders.findIndex(o => o.id === editId);
    if(idx >= 0) Object.assign(APP.nonWarrantyOrders[idx], data);
  } else {
    data.id = genId('nw');
    data.status = '待客户确认';
    data.orderNo = '';
    APP.nonWarrantyOrders.push(data);
  }
  saveData(APP);
  closeModal();
  renderPage();
}

function saveWarehouseLog() {
  const relatedOrder = document.getElementById('wh_order').value;
  if(!relatedOrder) { alert('请选择关联工单'); return; }
  APP.idCounters.wh++;
  const log = {
    id: `WH-${String(APP.idCounters.wh).padStart(4,'0')}`,
    relatedOrder,
    type: document.getElementById('wh_type').value,
    material: document.getElementById('wh_material').value,
    quantity: document.getElementById('wh_quantity').value,
    applyDate: document.getElementById('wh_applyDate').value,
    receiveDate: document.getElementById('wh_receiveDate').value,
    oldPartReceive: document.getElementById('wh_oldPartReceive').value,
    oldPartReturn: document.getElementById('wh_oldPartReturn').value,
    note: document.getElementById('wh_note').value,
  };

  // sync back to warranty order
  const wo = APP.warrantyOrders.find(o => o.id === relatedOrder);
  if(wo) {
    if(log.type === '申领') {
      wo.needMaterial = '1';
      wo.materialApplyDate = log.applyDate;
    } else if(log.type === '领用') {
      wo.materialReceiveDate = log.receiveDate;
      wo.engineerPickDate = log.receiveDate;
    } else if(log.type === '旧件') {
      wo.oldPartReceiveDate = log.oldPartReceive;
      wo.oldPartReturnDate = log.oldPartReturn;
    }
    wo.warehouseNote = log.note;
  }

  APP.warehouseLogs.push(log);
  saveData(APP);
  closeModal();
  renderPage();
}

function deleteWarehouseLog(id) {
  if(!confirm('确认删除此记录？')) return;
  APP.warehouseLogs = APP.warehouseLogs.filter(l => l.id !== id);
  saveData(APP);
  renderPage();
}

  if(id.startsWith('WN')) viewWarranty(id);

function exportCSV(type) {
  let headers, rows;
  if(type === 'warranty') {
    headers = ['编号','登记日期','客户名称','联系人','车辆信息','故障描述','维修类型','工单类型','状态','责任工程师','开工时间','完工日期','GSS工单号','是否申领物料','报单员','GSS总费用','总费用','备注'];
    rows = APP.warrantyOrders.map(o => [o.id,o.registerDate,o.customerName,o.contact,o.vehicleInfo,o.faultDesc,o.repairType,o.orderType,o.status,o.engineer,o.startDate,o.completeDate,o.gssOrderNo,o.needMaterial==='1'?'是':'否',o.reporter,o.gssFee,o.totalFee,o.platformNote]);
  } else if(type === 'nonwarranty') {
    headers = ['编号','城市','车牌号','签约客户','产品类型','项目类型','维修状态','维修工程师','报价总金额','已回款','未回款','毛利润','毛利率','付款状态','备注'];
    rows = APP.nonWarrantyOrders.map(o => [o.id,o.city,o.plateNumber,o.signedCustomer,o.productType,o.projectType,o.status,o.repairEngineer,o.quoteTotal,o.receivedAmount,o.unreceivedAmount,o.grossProfit,o.grossMargin,o.paymentStatus,o.remark]);
  } else {
    headers = ['登记编号','关联工单','类型','物料','数量','申领日期','领用日期','旧件接收','旧件返厂','备注'];
    rows = APP.warehouseLogs.map(l => [l.id,l.relatedOrder,l.type,l.material,l.quantity,l.applyDate,l.receiveDate,l.oldPartReceive,l.oldPartReturn,l.note]);
  }
  const bom = '\uFEFF';
  const csv = bom + [headers.join(','), ...rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${type}_${todayStr()}.csv`;
  a.click();
}

function exportJSON() {
  const json = JSON.stringify(APP, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `station_data_${todayStr()}.json`;
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(confirm('导入将覆盖当前所有数据，确认继续？')) {
        APP = { ...getDefaultData(), ...data };
        saveData(APP);
        renderPage();
        alert('导入成功！');
      }
    } catch(err) {
      alert('文件格式错误，请选择有效的JSON文件');
    }
  };
  reader.readAsText(file);
}

// ===== UTILS =====
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weekStartStr() {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthStartStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function isInPeriod(dateStr, period) {
  if (!dateStr || !period) return true;
  if (period === 'today') return dateStr === todayStr();
  if (period === 'week') return dateStr >= weekStartStr() && dateStr <= todayStr();
  if (period === 'month') return dateStr >= monthStartStr() && dateStr <= todayStr();
  return true;
}

function showUploadStatus(msg, type) {
  const el = document.getElementById('uploadStatusBar');
  if (!el) return;
  el.className = 'upload-status-bar show ' + type;
  el.innerHTML = msg;
  if (type === 'success') setTimeout(() => { el.className = 'upload-status-bar show info'; }, 8000);
}

function detectSheetType(headers) {
  const wnKeys = ['编号','登记日期','维修类型','完成状态','责任工程师'];
  const nwKeys = ['序号','城市','签约客户名称','维修状态','报价单总金额'];
  let wnScore = 0, nwScore = 0;
  headers.forEach(h => {
    const ht = h.trim();
    if (wnKeys.includes(ht)) wnScore++;
    if (nwKeys.includes(ht)) nwScore++;
  });
  if (wnScore >= 2 && wnScore > nwScore) return 'warranty';
  if (nwScore >= 2 && nwScore > wnScore) return 'nonwarranty';
  if (headers.some(h => h.includes('完成状态'))) return 'warranty';
  if (headers.some(h => h.includes('维修状态'))) return 'nonwarranty';
  return null;
}

function mapRow(rawRow, columnMap, defaults) {
  const obj = {...defaults};
  for (const [cnHeader, jsKey] of Object.entries(columnMap)) {
    if (rawRow[cnHeader] === undefined || rawRow[cnHeader] === null) continue;
    let val = rawRow[cnHeader];
    if (val instanceof Date) {
      const y = val.getFullYear();
      const m = String(val.getMonth()+1).padStart(2,'0');
      const d = String(val.getDate()).padStart(2,'0');
      val = `${y}-${m}-${d}`;
    } else {
      val = String(val).trim();
      if (val === '') continue;   // 空单元格保留默认值，避免覆盖 0 / 0.0 等
    }
    obj[jsKey] = val;
  }
  return obj;
}

function handleExcelUpload(input) {
  const file = input.files[0];
  if (!file) return;

  showUploadStatus('⏳ 正在读取 <b>' + file.name + '</b> ...', 'info');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array', cellDates:true});

      let totalWn = 0, totalNw = 0;
      const newWnData = [], newNwData = [];

      for (const sheetName of workbook.SheetNames) {
        const sheet = workbook.Sheets[sheetName];
        const jsonData = XLSX.utils.sheet_to_json(sheet, {defval:''});
        if (!jsonData.length) continue;

        const headers = Object.keys(jsonData[0]);
        const sheetType = detectSheetType(headers);

        if (sheetType === 'warranty') {
          jsonData.forEach(row => {
            const mapped = mapRow(row, WN_COLUMN_MAP, WN_DEFAULTS);
            if (!mapped.id) mapped.id = genId('wn');
            const validStatuses = ['未派工','未开工','在修','已竣工','已结算','已结清','已终止'];
            if (!validStatuses.includes(mapped.status)) mapped.status = '未派工';
            newWnData.push(mapped);
          });
          totalWn += jsonData.length;
        } else if (sheetType === 'nonwarranty') {
          jsonData.forEach(row => {
            const mapped = mapRow(row, NW_COLUMN_MAP, NW_DEFAULTS);
            if (!mapped.seq) mapped.seq = String(newNwData.length + 1);
            const validStatuses = ['待客户确认','维修完成','关闭工单'];
            if (!validStatuses.includes(mapped.status)) mapped.status = '待客户确认';
            newNwData.push(mapped);
          });
          totalNw += jsonData.length;
        } else {
          const hasWnHeaders = headers.some(h => h.includes('完成状态') || h.includes('责任工程师') || h.includes('维修类型'));
          const hasNwHeaders = headers.some(h => h.includes('维修状态') || h.includes('签约客户') || h.includes('报价单'));
          if (hasWnHeaders && !hasNwHeaders) {
            jsonData.forEach(row => {
              const mapped = mapRow(row, WN_COLUMN_MAP, WN_DEFAULTS);
              if (!mapped.id) mapped.id = genId('wn');
              const validStatuses = ['未派工','未开工','在修','已竣工','已结算','已结清','已终止'];
              if (!validStatuses.includes(mapped.status)) mapped.status = '未派工';
              newWnData.push(mapped);
            });
            totalWn += jsonData.length;
          } else if (hasNwHeaders && !hasWnHeaders) {
            jsonData.forEach(row => {
              const mapped = mapRow(row, NW_COLUMN_MAP, NW_DEFAULTS);
              if (!mapped.seq) mapped.seq = String(newNwData.length + 1);
              const validStatuses = ['待客户确认','维修完成','关闭工单'];
              if (!validStatuses.includes(mapped.status)) mapped.status = '待客户确认';
              newNwData.push(mapped);
            });
            totalNw += jsonData.length;
          }
        }
      }

      if (totalWn === 0 && totalNw === 0) {
        showUploadStatus('⚠️ 未能识别数据类型，请确保Excel列头与保内/保外模板一致', 'error');
        input.value = '';
        return;
      }

      // 合并到现有数据
      if (totalWn > 0) {
        APP.warrantyOrders = APP.warrantyOrders.concat(newWnData);
      }
      if (totalNw > 0) {
        APP.nonWarrantyOrders = APP.nonWarrantyOrders.concat(newNwData);
      }
      saveData(APP);
      renderPage();

      let msg = '✅ 导入成功！';
      const parts = [];
      if (totalWn > 0) parts.push('保内 <span class="upload-badge">' + totalWn + ' 条</span>');
      if (totalNw > 0) parts.push('保外 <span class="upload-badge">' + totalNw + ' 条</span>');
      msg += ' ' + parts.join(' · ') + ' — 来自 <b>' + file.name + '</b>';
      showUploadStatus(msg, 'success');

    } catch(err) {
      console.error(err);
      showUploadStatus('❌ 解析失败：' + err.message, 'error');
    }
  };
  reader.onerror = function() {
    showUploadStatus('❌ 文件读取失败', 'error');
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

// ===== INIT =====
async function initApp() {
  // Check if localStorage has data
  let hasData = false;
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && (d.warrantyOrders.length > 0 || d.nonWarrantyOrders.length > 0)) {
      hasData = true;
    }
  } catch(e) {}
  
  // If no data, load default from GitHub
  if (!hasData) {
    try {
      console.log('Loading default data from GitHub...');
      const [wnResp, nwResp] = await Promise.all([
        fetch('https://herman-yan.github.io/doc-vault/work-order/data_wn.json'),
        fetch('https://herman-yan.github.io/doc-vault/work-order/data_nw.json')
      ]);
      
      if (wnResp.ok && nwResp.ok) {
        const wnData = await wnResp.json();
        const nwData = await nwResp.json();
        
        APP.warrantyOrders = wnData;
        APP.nonWarrantyOrders = nwData;
        
        // Set idCounters based on loaded data
        APP.idCounters.wn = wnData.length;
        APP.idCounters.nw = nwData.length;
        
        saveData(APP);
        console.log(`Loaded ${wnData.length} warranty + ${nwData.length} non-warranty orders`);
      }
    } catch(e) {
      console.error('Failed to load default data:', e);
    }
  }
  
  renderPage();
}

initApp();
